  font-family: var(--mono);
  font-size: 12px;
  letter-spacing: 0.14em;
  color: var(--ink-3);
  text-transform: uppercase;
  margin-top: 2px;
}

@media (max-width: 1100px){
  .covstrip{ grid-template-columns: 1fr 1fr; }
}
@media (max-width: 760px){
  .covstrip{ grid-template-columns: 1fr; }
}

/* ============ Main point block (above triad) ============ */
/* ── Before-you-begin context / tone note ── */
.context-note{
  margin: 22px 0 0;
  padding: 15px 20px 16px;
  position: relative;
  border-radius: 14px;
  background: linear-gradient(180deg, oklch(0.95 0.05 80 / 0.92) 0%, oklch(0.93 0.05 80 / 0.80) 100%);
  border: 1px solid oklch(0.80 0.08 80 / 0.7);
  box-shadow: var(--shadow-soft);
}
.context-note::before{
  content:''; position:absolute; left:0; top:13px; bottom:13px;
  width:4px; border-radius:0 4px 4px 0; background: var(--c-kingdom);
}
.context-note__label{
  font-family: var(--mono); font-size: 11.5px; letter-spacing: 0.2em;
  text-transform: uppercase; color: oklch(0.45 0.10 75); font-weight: 700;
  display:flex; align-items:center; gap:8px; margin-bottom: 7px;
}
.context-note__icon{ font-size: 13px; line-height:1; color: var(--c-kingdom); }
.context-note__body{
  font-family: var(--serif); font-size: 15.5px; line-height: 1.5; color: var(--ink-2);
}
.context-note__body p{ margin: 0 0 6px; }
.context-note__body p:last-child{ margin-bottom: 0; }
.context-note--recap{ margin: 0 0 4px; }
/* Blue variant — shown at the top of Passage Divisions */
.context-note--divisions{
  margin: 0 0 10px; padding: 12px 16px 13px;
  background: linear-gradient(180deg, oklch(0.95 0.04 250 / 0.92) 0%, oklch(0.93 0.045 250 / 0.80) 100%);
  border-color: oklch(0.80 0.07 250 / 0.7);
}
.context-note--divisions::before{ background: var(--c-promises); }
.context-note--divisions .context-note__label{ color: oklch(0.42 0.11 250); }
.context-note--divisions .context-note__icon{ color: var(--c-promises); }

.mainpoint{
  margin: 22px 0 0;
  padding: 22px 28px 24px;
  position: relative;
  border-radius: 14px;
  background:
    linear-gradient(180deg, rgba(255,250,236,0.95) 0%, rgba(247,241,222,0.85) 100%);
  border: 1px solid var(--rule);
  box-shadow: var(--shadow-soft);
  display:grid;
  grid-template-columns: 150px 1fr;
  gap: 24px;
  align-items: start;
}
.mainpoint::before{
  content:'';
  position: absolute;
  left: 0; top: 18px; bottom: 18px;
  width: 4px;
  background: linear-gradient(180deg, var(--c-intention), var(--c-nt));
  border-radius: 0 4px 4px 0;
}
.mainpoint__label{
  font-family: var(--mono);
  font-size: 12px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--ink-3);
  display: flex; align-items: center; gap: 8px;
  padding-top: 6px;
}
.mainpoint__bullet{
  color: var(--c-intention);
  font-size: 12px;
  line-height: 1;
}
.mainpoint__text{
  margin: 0;
  font-family: var(--serif);
  font-style: italic;
  font-size: 26px;
  line-height: 1.3;
  font-weight: 500;
  color: var(--ink);
  letter-spacing: -0.005em;
  text-wrap: pretty;
  max-width: 64ch;
}
.mainpoint__text p{ margin: 0 0 10px; }
.mainpoint__text p:last-child{ margin-bottom: 0; }

@media (max-width: 760px){
  .mainpoint{
    grid-template-columns: 1fr;
    padding: 18px 20px 20px;
    gap: 10px;
  }
  .mainpoint__text{ font-size: 20px; }
}

/* ============ Tension Triad ============ */
.triad{
  margin: 22px 0 18px;
  padding: 22px 24px 24px;
  border: 1px solid var(--rule);
  border-radius: 14px;
  background:
    linear-gradient(180deg, rgba(251,247,236,0.7) 0%, rgba(247,241,222,0.55) 100%),
    var(--bg-card);
  box-shadow: var(--shadow-soft);
  position: relative;
  overflow: hidden;
}
.triad__header{
  display:flex; flex-direction:column; gap: 6px;
  margin-bottom: 18px;
  padding-bottom: 14px;
  border-bottom: 1px dashed var(--rule);
}
.triad__eyebrow{
  font-family: var(--mono);
  font-size: 12px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--ink-3);
}
.triad__title{
  font-family: var(--serif);
  font-style: italic;
  font-size: 24px;
  line-height: 1.15;
  font-weight: 500;
  letter-spacing: -0.005em;
  margin: 0;
  color: var(--ink);
  text-wrap: pretty;
}
.triad__title .triad__sep{
  color: var(--ink-3);
  font-style: normal;
  margin: 0 10px;
  font-weight: 400;
}

.triad__rail{
  display:grid;
  grid-template-columns: 1fr 44px 1fr;
  gap: 0;
  align-items: stretch;
}
.triad__col{
  border: 1px solid var(--rule);
  border-radius: 12px;
  padding: 14px 16px 16px;
  background:
    linear-gradient(180deg, var(--theme-soft), var(--bg-card) 75%);
  position: relative;
  display:flex; flex-direction:column; gap: 10px;
  border-left: 3px solid var(--theme-color);
}
.triad__col.is-empty{ opacity: 0.6; }
.triad__col-head, .triad__nt-head{
  display:flex; align-items:center; gap: 8px;
  flex-wrap: wrap;
}
.triad__glyph{
  font-family: var(--serif);
  font-size: 16px;
  color: var(--theme-color);
  line-height: 1;
}
.triad__tag{
  font-family: var(--sans);
  text-transform: uppercase;
  letter-spacing: 0.16em;
  font-weight: 700;
  font-size: 12px;
  color: var(--theme-color);
}
.triad__label{
  font-family: var(--serif);
  font-style: italic;
  font-size: 16px;
  color: var(--ink);
  font-weight: 500;
}
.triad__body{
  font-family: var(--sans);
  font-size: 14px;
  line-height: 1.55;
  color: var(--ink);
  text-wrap: pretty;
}
.triad__body.is-mono{
  font-family: var(--mono);
  font-size: 12px;
  line-height: 1.5;
  color: var(--ink-2);
}
.triad__body p{ margin: 0 0 8px; }
.triad__body p:last-child{ margin-bottom: 0; }
.triad__empty{
  font-family: var(--serif);
  font-style: italic;
  color: var(--muted);
}

.triad__vs{
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  gap: 6px;
  padding: 4px 0;
}
.triad__vs-bar{
  width: 1px; flex: 1;
  background: linear-gradient(180deg, transparent, var(--rule-2) 30%, var(--rule-2) 70%, transparent);
}
.triad__vs-label{
  font-family: var(--serif);
  font-style: italic;
  font-size: 18px;
  color: var(--ink-3);
  background: var(--bg-card);
  border: 1px solid var(--rule);
  border-radius: 99px;
  padding: 3px 12px;
  letter-spacing: 0.04em;
}

.triad__bridge{
  display:grid;
  grid-template-columns: 1fr auto auto auto 1fr;
  align-items:center;
  gap: 10px;
  margin: 16px 0 14px;
}
.triad__bridge-line{
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--rule-2), transparent);
}
.triad__bridge-arrow{
  font-family: var(--serif);
  font-size: 18px;
  color: var(--c-nt);
  line-height: 1;
}
.triad__bridge-label{
  font-family: var(--mono);
  font-size: 12px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--c-nt);
  padding: 4px 10px;
  border: 1px solid var(--c-nt);
  border-radius: 99px;
  background: var(--c-nt-soft);
}

.triad__nt{
  border: 1px solid var(--c-nt);
  border-radius: 12px;
  padding: 16px 18px 18px;
  background:
    linear-gradient(180deg, var(--c-nt-soft), var(--bg-card) 80%);
  display:flex; flex-direction:column; gap: 12px;
  box-shadow: 0 1px 0 rgba(40,30,10,0.04), 0 14px 36px -22px rgba(40,30,10,0.35);
}
.triad__nt-ask{
  display:flex; align-items:center; gap: 10px;
  margin: -4px -6px 4px;
  padding: 8px 12px;
  background: var(--c-nt-soft);
  border-radius: 8px;
  border: 1px dashed var(--c-nt);
}
.triad__nt-ask-glyph{
  font-family: var(--serif);
  font-size: 18px;
  color: var(--c-nt);
  line-height: 1;
}
.triad__nt-ask-text{
  flex: 1;
  font-family: var(--serif);
  font-style: italic;
  font-size: 16px;
  line-height: 1.2;
  color: var(--ink);
  font-weight: 500;
  letter-spacing: -0.005em;
}
.triad__nt-ask-text em{
  font-style: italic;
  color: var(--c-nt);
  white-space: nowrap;
}
.triad__nt-ask-cite{
  font-family: var(--mono);
  font-size: 12px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--c-nt);
  font-weight: 700;
  padding: 3px 8px;
  border: 1px solid var(--c-nt);
  border-radius: 99px;
  background: var(--bg-card);
  white-space: nowrap;
}
.triad__nt .tcard__ntref{
  margin-bottom: 0;
}

/* When triad sits inside the dark hero detail, lighten chrome */
.detail .triad{
  margin-top: 24px;
}

/* Others section (kingdom / salvation / promises shown below the triad) */
.othersect{
  margin-top: 22px;
}
.othersect__rule{
  display:flex; align-items:center; gap: 12px;
  margin-bottom: 14px;
}
.othersect__rule::before,
.othersect__rule::after{
  content:'';
  flex: 1;
  height: 1px;
  background: var(--rule);
}
.othersect__label{
  font-family: var(--mono);
  font-size: 12px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--ink-3);
}
.theme-grid--others{ grid-template-columns: repeat(3, 1fr); }

/* Reading view tweak — wrap themes column so triad + others can stack */
.rsess__content{
  display:flex; flex-direction:column; gap: 4px;
  min-width: 0;
}
.rsess__content .triad{
  margin: 0;
}

/* responsive niceties */
@media (max-width: 1100px){
  .theme-grid{ grid-template-columns: repeat(2, 1fr); }
  .hero{ grid-template-columns: 1fr; }
  .hero__legend{ min-width: 0; }
  .theme-grid--others{ grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 760px){
  .shell{ padding: 22px 16px 60px; }
  .theme-grid{ grid-template-columns: 1fr; }
  .theme-grid--others{ grid-template-columns: 1fr; }
  .subway__inner{ grid-template-columns: 1fr; }
  .matrix__inner{ grid-template-columns: var(--mcol-label, 118px) repeat(var(--sess-cols, 11), var(--mcol-w, 150px)); }
  .triad__rail{
    grid-template-columns: 1fr;
    gap: 14px;
  }
  .triad__vs{
    flex-direction: row;
    gap: 10px;
    padding: 0;
  }
  .triad__vs-bar{
    width: auto; height: 1px;
    background: linear-gradient(90deg, transparent, var(--rule-2) 30%, var(--rule-2) 70%, transparent);
  }
}


/* ============ Recap mode ============ */
.recap{
  margin-top: 8px;
}
.recap__intro{
  display:grid;
  grid-template-columns: 1fr auto;
  gap: 28px;
  align-items: end;
  padding: 22px 24px;
  background: var(--bg-card);
  border: 1px solid var(--rule);
  border-radius: 14px;
  box-shadow: var(--shadow-soft);
  margin-bottom: 18px;
}
.recap__eyebrow{
  font-family: var(--mono);
  font-size: 12px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--c-promises);
  font-weight: 700;
}
.recap__title{
  font-family: var(--serif);
  font-weight: 500;
  font-size: 30px;
  line-height: 1.1;
  margin: 6px 0 8px;
  color: var(--ink);
  letter-spacing: -0.01em;
}
.recap__lede{
  font-family: var(--serif);
  font-style: italic;
  font-size: 15px;
  color: var(--ink-2);
  max-width: 64ch;
  margin: 0;
}
.recap__progress{
  display:flex; flex-direction:column; gap: 8px; align-items: flex-end;
  min-width: 220px;
}
.recap__progressbar{
  width: 220px; height: 6px; border-radius: 99px;
  background: var(--rule);
  overflow: hidden;
}
.recap__progressbar > span{
  display:block; height:100%;
  background: linear-gradient(90deg, var(--c-promises), var(--c-nt));
  transition: width 260ms ease;
}
.recap__progresslabel{
  font-family: var(--mono);
  font-size: 12px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--ink-3);
}

.recap__filters{
  display:flex; gap: 8px; margin: 4px 0 18px; flex-wrap: wrap;
}
.recap-filter{
  appearance:none; border: 1px solid var(--rule); background: var(--bg-card);
  font-family: var(--sans); font-size: 12px; font-weight: 600;
  letter-spacing: 0.04em;
  color: var(--ink-3);
  padding: 7px 14px; border-radius: 99px;
  cursor: pointer;
  transition: background 160ms, color 160ms, border-color 160ms;
}
.recap-filter:hover{ color: var(--ink); }
.recap-filter.is-on{ background: var(--ink); color: #f5efe1; border-color: var(--ink); }

.recap__grid{
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(420px, 1fr));
  gap: 18px;
}
.recap__empty{
  grid-column: 1 / -1;
  font-family: var(--serif);
  font-style: italic;
  color: var(--ink-3);
  padding: 24px;
  text-align: center;
}

.recap-card{
  background: var(--bg-card);
  border: 1px solid var(--rule);
  border-radius: 14px;
  padding: 18px 20px 20px;
  box-shadow: var(--shadow-soft);
  display:flex; flex-direction:column; gap: 14px;
  transition: box-shadow 200ms, border-color 200ms;
}
.recap-card.is-done{
  border-color: var(--c-nt);
  background: linear-gradient(180deg, var(--c-nt-soft), var(--bg-card) 30%);
}
.recap-card__head{ border-bottom: 1px dashed var(--rule); padding-bottom: 10px; }
.recap-card__meta{
  display:flex; align-items:center; gap: 10px; flex-wrap: wrap;
  font-family: var(--mono); font-size: 12px;
  letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink-3);
}
.recap-card__badge{
  background: var(--ink); color: #f5efe1;
  padding: 3px 8px; border-radius: 4px; font-weight: 700;
}
.recap-card__book{ color: var(--ink-2); }
.recap-card__done{ color: var(--c-nt); font-weight: 700; }
.recap-card__topic{
  font-family: var(--serif);
  font-weight: 500;
  font-size: 22px;
  line-height: 1.15;
  margin: 8px 0 0;
  color: var(--ink);
}

.recap-card__qlabel{
  font-family: var(--mono); font-size: 12px;
  letter-spacing: 0.22em; text-transform: uppercase;
  color: var(--c-promises); font-weight: 700;
}
.recap-card__qtext{
  font-family: var(--serif); font-style: italic;
  font-size: 17px; color: var(--ink); margin: 6px 0 10px;
}
.recap-card__attempt{
  width: 100%;
  font-family: var(--serif);
  font-size: 14px;
  color: var(--ink);
  background: var(--bg-card-2);
  border: 1px solid var(--rule);
  border-radius: 8px;
  padding: 10px 12px;
  resize: vertical;
  min-height: 64px;
}
.recap-card__attempt:focus{
  outline: none;
  border-color: var(--c-promises);
  box-shadow: 0 0 0 3px var(--c-promises-soft);
}
.recap-card__qrow{
  display:flex; gap: 8px; flex-wrap: wrap; margin-top: 10px;
}
.recap-card__answer{
  margin-top: 10px;
  padding: 10px 12px;
  background: var(--c-promises-soft);
  border-left: 3px solid var(--c-promises);
  border-radius: 6px;
  font-family: var(--serif);
  font-size: 14px;
  color: var(--ink-2);
}

.recap-card__reveal{
  display:flex; flex-direction: column; gap: 12px;
  padding-top: 4px;
  animation: recapFade 240ms ease;
}
@keyframes recapFade {
  from { opacity: 0; transform: translateY(4px); }
  to   { opacity: 1; transform: translateY(0); }
}
.recap-card__row{ display: flex; flex-direction: column; gap: 6px; }
.recap-card__rowlabel{
  font-family: var(--mono); font-size: 12px;
  letter-spacing: 0.22em; text-transform: uppercase;
  color: var(--ink-3); font-weight: 700;
}
.recap-card__main{
  font-family: var(--serif);
  font-size: 16px;
  color: var(--ink);
  margin: 0;
  line-height: 1.45;
}
.recap-card__threads{ display:flex; flex-wrap:wrap; gap: 6px; }
.recap-thread{
  display:inline-flex; align-items:center; gap: 6px;
  padding: 4px 10px;
  border-radius: 99px;
  background: var(--theme-soft);
  border: 1px solid var(--theme-color);
  font-family: var(--sans);
  font-size: 12px;
  color: var(--theme-color);
  font-weight: 600;
}
.recap-thread.is-primary{
  background: var(--theme-color);
  color: #f5efe1;
}
.recap-thread__glyph{ font-size: 12px; }
.recap-card__row--nt{
  background: var(--c-nt-soft);
  border-left: 3px solid var(--c-nt);
  padding: 10px 12px;
  border-radius: 6px;
}
.recap-card__nt{
  font-family: var(--serif);
  font-size: 14.5px;
  color: var(--ink-2);
  margin: 0;
  line-height: 1.45;
}
.recap-card__ntref{
  color: var(--c-nt);
  font-style: italic;
  font-weight: 600;
}

/* Buttons used across recap */
.recap-btn{
  appearance:none; border: 1px solid var(--rule); background: var(--bg-card);
  font-family: var(--sans); font-size: 12px; font-weight: 600;
  letter-spacing: 0.04em;
  color: var(--ink-2);
  padding: 8px 14px; border-radius: 99px;
  cursor: pointer;
  transition: background 160ms, color 160ms, border-color 160ms, transform 80ms;
}
.recap-btn:hover{ color: var(--ink); border-color: var(--ink-3); }
.recap-btn:active{ transform: translateY(1px); }
.recap-btn--primary{
  background: var(--ink); color: #f5efe1; border-color: var(--ink);
}
.recap-btn--primary:hover{ background: var(--c-promises); border-color: var(--c-promises); color: #f5efe1; }
.recap-btn--ghost{ background: transparent; }
.recap-btn[disabled]{ opacity: 0.4; cursor: not-allowed; }

/* Express recap modal */
.recap-modal{
  position: fixed; inset: 0;
  background: rgba(29, 24, 18, 0.55);
  backdrop-filter: blur(4px);
  display: flex; align-items: center; justify-content: center;
  z-index: 1000;
  animation: recapFade 200ms ease;
}
.recap-modal__inner{
  width: min(620px, 92vw);
  background: var(--bg-card);
  border: 1px solid var(--rule);
  border-top: 4px solid var(--tone-color, var(--c-promises));
  border-radius: 14px;
  box-shadow: var(--shadow-deep);
  padding: 22px 26px 18px;
  display: flex; flex-direction: column; gap: 14px;
}
.recap-modal__head{
  display:flex; align-items:center; justify-content: space-between;
  font-family: var(--mono);
  font-size: 12px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--ink-3);
}
.recap-modal__close{
  appearance:none; border:0; background:transparent;
  font-size: 22px; color: var(--ink-3); cursor: pointer;
  padding: 0 4px;
}
.recap-modal__close:hover{ color: var(--ink); }
.recap-modal__progress{
  display:flex; gap: 6px;
}
.recap-modal__pip{
  flex: 1;
  height: 4px;
  border-radius: 99px;
  background: var(--rule);
  transition: background 220ms;
}
.recap-modal__pip.is-on{ background: var(--tone-color, var(--c-promises)); }
.recap-modal__pip.is-done{ background: var(--ink-3); }

.recap-modal__card{
  padding: 12px 4px 6px;
  min-height: 180px;
  display:flex; flex-direction:column; gap: 10px;
}
.recap-modal__label{
  font-family: var(--mono);
  font-size: 12px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--tone-color, var(--c-promises));
  font-weight: 700;
}
.recap-modal__title{
  font-family: var(--serif);
  font-weight: 500;
  font-size: 26px;
  line-height: 1.15;
  margin: 0;
  color: var(--ink);
  letter-spacing: -0.005em;
}
.recap-modal__body{
  font-family: var(--serif);
  font-size: 16px;
  color: var(--ink-2);
  margin: 0;
  line-height: 1.5;
}
.recap-modal__foot{
  display:flex; align-items:center; gap: 12px; justify-content: space-between;
  padding-top: 6px;
  border-top: 1px dashed var(--rule);
}
.recap-modal__count{
  font-family: var(--mono);
  font-size: 12px;
  letter-spacing: 0.18em;
  color: var(--ink-3);
}

@media (max-width: 720px){
  .recap__intro{ grid-template-columns: 1fr; }
  .recap__progress{ align-items: flex-start; }
}



/* ============ v3: thread compass, scrubmap, christ rail, search,
                compare drawer, tension, cloze, quiz, presenter,
                further study, divisions, passage refs               ============ */

/* Site-wide spotlight when a theme is pinned */
.shell.is-spotlight-kingdom    .dimmable:not(.is-theme-kingdom),
.shell.is-spotlight-salvation  .dimmable:not(.is-theme-salvation),
.shell.is-spotlight-promises   .dimmable:not(.is-theme-promises),
.shell.is-spotlight-intention  .dimmable:not(.is-theme-intention),
.shell.is-spotlight-reality    .dimmable:not(.is-theme-reality),
.shell.is-spotlight-nt         .dimmable:not(.is-theme-nt){
  opacity: 0.25;
  transition: opacity 220ms ease;
}

/* Sticky thread compass — fixed top-right */
.thread-compass{
  position: fixed; top: 18px; right: 18px; z-index: 900;
  background: rgba(251, 247, 236, 0.96);
  border: 1px solid var(--rule);
  border-radius: 12px;
  box-shadow: var(--shadow-soft);
  padding: 8px 12px;
  max-width: 360px;
  display: flex; flex-direction: column; gap: 6px;
  font-family: var(--sans);
  backdrop-filter: blur(6px);
}
.thread-compass__row{ display:flex; align-items:center; gap: 10px; flex-wrap: wrap; }
.thread-compass__label{
  font-family: var(--mono); font-size: 12px; letter-spacing: 0.22em;
  text-transform: uppercase; color: var(--ink-3); font-weight: 700;
}
.thread-compass__sess{ font-size: 12px; font-weight: 600; color: var(--ink); }
.thread-compass__theme{
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 12px; color: var(--theme-color, var(--ink-2));
  font-weight: 600;
}
.thread-compass__glyph{ font-size: 12px; }
.thread-compass__clear{
  appearance: none; border: 0; background: transparent;
  color: var(--ink-3); cursor: pointer; font-size: 16px;
  margin-left: auto; padding: 0 4px;
}
.thread-compass__clear:hover{ color: var(--ink); }
.thread-compass__next{
  appearance: none; border: 0; background: transparent;
  font-family: var(--serif); font-style: italic; font-size: 12px;
  color: var(--ink-2); cursor: pointer; text-align: left; padding: 2px 0;
}
.thread-compass__next:hover{ color: var(--ink); text-decoration: underline; }

/* Toolbar icon buttons */
.toolbar-iconbtn{
  appearance: none; border: 1px solid var(--rule); background: var(--bg-card);
  font-family: var(--sans); font-size: 12px; font-weight: 600;
  letter-spacing: 0.02em; color: var(--ink-3);
  padding: 7px 12px; border-radius: 99px; cursor: pointer;
  transition: background 160ms, color 160ms, border-color 160ms;
}
.toolbar-iconbtn:hover:not([disabled]){ color: var(--ink); border-color: var(--ink-3); }
.toolbar-iconbtn.is-on{ background: var(--ink); color: #f5efe1; border-color: var(--ink); }
.toolbar-iconbtn[disabled]{ opacity: 0.4; cursor: not-allowed; }

/* SearchBox */
.searchbox{
  display: inline-flex; align-items: center; gap: 6px;
  border: 1px solid var(--rule); background: var(--bg-card);
  border-radius: 99px; padding: 4px 10px;
  font-family: var(--sans);
}
.searchbox__icon{ color: var(--ink-3); font-size: 14px; }
.searchbox__input{
  appearance: none; border: 0; background: transparent; outline: none;
  font-family: var(--sans); font-size: 12px; color: var(--ink);
  min-width: 220px;
}
.searchbox__count{
  font-family: var(--mono); font-size: 12px; color: var(--ink-3);
  letter-spacing: 0.12em;
}
.searchbox__clear{
  appearance: none; border: 0; background: transparent;
  color: var(--ink-3); cursor: pointer; padding: 0 2px;
}

/* Scrubmap */
.scrubmap{
  margin: 4px 0 14px;
  border: 1px solid var(--rule);
  border-radius: 12px;
  background: var(--bg-card);
  padding: 6px 8px 8px;
}
.scrubmap__arcs{ display: flex; gap: 4px; }
.scrubmap__arc{
  background: var(--arc-soft, var(--bg-card-2));
  border-bottom: 2px solid var(--arc-color, var(--rule));
  border-radius: 6px 6px 0 0;
  padding: 4px 10px;
  text-align: center;
  font-family: var(--mono);
  font-size: 12px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--arc-color, var(--ink-3));
  font-weight: 700;
}
.scrubmap__ticks{ display: flex; gap: 4px; margin-top: 6px; }
.scrubmap__tick{
  flex: 1; appearance: none; border: 1px solid var(--rule); background: var(--bg-card-2);
  border-radius: 6px; padding: 4px 0;
  font-family: var(--mono); font-size: 12px; letter-spacing: 0.04em;
  color: var(--ink-3); cursor: pointer; font-weight: 600;
  transition: background 120ms, color 120ms;
}
.scrubmap__tick:hover{ background: var(--ink); color: #f5efe1; }
.scrubmap__tick.is-on{ background: var(--ink); color: #f5efe1; }

/* Christ rail (bottom) */
.christ-rail{
  position: fixed; left: 0; right: 0; bottom: 0; z-index: 850;
  background: rgba(251, 247, 236, 0.97);
  border-top: 2px solid var(--c-nt);
  box-shadow: 0 -8px 24px -10px rgba(40,30,10,0.18);
  font-family: var(--sans);
}
.christ-rail__toggle{
  appearance: none; border: 0; background: transparent;
  display: flex; align-items: center; gap: 10px;
  padding: 8px 18px;
  width: 100%;
  font-family: var(--mono); font-size: 12px; letter-spacing: 0.18em;
  text-transform: uppercase; color: var(--c-nt); font-weight: 700;
  cursor: pointer;
}
.christ-rail__glyph{ font-size: 14px; }
.christ-rail__chev{ margin-left: auto; }
.christ-rail__inner{
  padding: 4px 12px 14px;
  display: grid; grid-auto-flow: column; grid-auto-columns: minmax(180px, 1fr);
  overflow-x: auto; gap: 8px;
  max-height: 36vh;
}
.christ-rail__cell{
  appearance: none; border: 1px solid var(--c-nt);
  background: var(--c-nt-soft);
  border-radius: 8px;
  padding: 8px 10px;
  font-family: var(--sans);
  font-size: 12px;
  color: var(--ink);
  cursor: pointer;
  text-align: left;
  display: flex; flex-direction: column; gap: 4px;
  transition: transform 120ms;
}
.christ-rail__cell:hover{ transform: translateY(-1px); }
.christ-rail__num{
  font-family: var(--mono); font-size: 12px; letter-spacing: 0.2em;
  color: var(--c-nt); font-weight: 700;
}
.christ-rail__nt{ line-height: 1.3; }
.christ-rail__ref{ font-family: var(--serif); font-style: italic; color: var(--ink-3); font-size: 12px; }

/* Compare drawer (above the christ rail when both open) */
.cmp-drawer{
  position: fixed; left: 12px; right: 12px; bottom: 56px;
  background: var(--bg-card);
  border: 1px solid var(--rule);
  border-radius: 14px;
  box-shadow: var(--shadow-deep);
  padding: 14px 16px 12px;
  z-index: 860;
  max-height: 64vh;
  overflow: auto;
}
.cmp-drawer__head{
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 8px;
}
.cmp-drawer__label{
  font-family: var(--mono); font-size: 12px; letter-spacing: 0.22em;
  text-transform: uppercase; color: var(--ink-2); font-weight: 700;
}
.cmp-drawer__clear{
  appearance: none; border: 1px solid var(--rule); background: transparent;
  font-family: var(--sans); font-size: 12px; padding: 4px 10px;
  border-radius: 99px; cursor: pointer; color: var(--ink-3);
}
.cmp-drawer__grid{ display: grid; gap: 12px; }
.cmp-drawer__hint{
  margin: 8px 0 0; font-family: var(--serif); font-style: italic;
  font-size: 12px; color: var(--ink-3);
}
.cmp-card{
  background: var(--bg-card-2);
  border: 1px solid var(--rule);
  border-radius: 10px;
  padding: 10px 12px;
  display: flex; flex-direction: column; gap: 8px;
}
.cmp-card__head{ display: flex; align-items: center; gap: 8px; }
.cmp-card__badge{
  font-family: var(--mono); font-size: 12px; letter-spacing: 0.18em;
  background: var(--ink); color: #f5efe1;
  padding: 2px 8px; border-radius: 4px; font-weight: 700;
}
.cmp-card__topic{
  font-family: var(--serif); font-size: 15px; color: var(--ink); font-weight: 500;
}
.cmp-card__remove{
  appearance: none; border: 0; background: transparent; color: var(--ink-3);
  cursor: pointer; margin-left: auto; font-size: 16px;
}
.cmp-card__row{ display: flex; flex-direction: column; gap: 4px; }
.cmp-card__rowlabel{
  font-family: var(--mono); font-size: 12px; letter-spacing: 0.2em;
  text-transform: uppercase; color: var(--ink-3); font-weight: 700;
}
.cmp-card__row p{ margin: 0; font-family: var(--serif); font-size: 13px; color: var(--ink-2); }
.cmp-card__row--split{ flex-direction: row; gap: 8px; }
.cmp-card__half{ flex: 1; padding: 8px; border-radius: 6px; }
.cmp-card__half--intent{ background: var(--c-intention-soft); border-left: 3px solid var(--c-intention); }
.cmp-card__half--reality{ background: var(--c-reality-soft); border-left: 3px solid var(--c-reality); }
.cmp-card__row--nt{ background: var(--c-nt-soft); border-left: 3px solid var(--c-nt); padding: 8px; border-radius: 6px; }
.cmp-card__foot{ margin-top: auto; }

/* Tension view */
.tension{ margin-top: 8px; }
.tension__head{ padding: 18px 22px; background: var(--bg-card); border: 1px solid var(--rule); border-radius: 14px; margin-bottom: 14px; }
.tension__eyebrow{
  font-family: var(--mono); font-size: 12px; letter-spacing: 0.22em;
  text-transform: uppercase; color: var(--c-intention); font-weight: 700;
}
.tension__title{
  font-family: var(--serif); font-weight: 500; font-size: 28px;
  margin: 6px 0 0; line-height: 1.1; color: var(--ink); letter-spacing: -0.01em;
}
.tension__rows{ display: flex; flex-direction: column; gap: 10px; }
.tension-row{
  display: grid;
  grid-template-columns: 120px 1fr 28px 1fr;
  gap: 12px;
  align-items: stretch;
  padding: 14px 16px;
  background: var(--bg-card);
  border: 1px solid var(--rule);
  border-radius: 12px;
  cursor: pointer;
  transition: box-shadow 160ms, transform 120ms;
}
.tension-row:hover{ box-shadow: var(--shadow-soft); transform: translateY(-1px); }
.tension-row__num{ display: flex; flex-direction: column; justify-content: center; gap: 4px; border-right: 1px dashed var(--rule); padding-right: 10px; }
.tension-row__sess{
  font-family: var(--mono); font-size: 12px; letter-spacing: 0.2em;
  color: var(--ink-3); font-weight: 700;
}
.tension-row__topic{ font-family: var(--serif); font-size: 14px; color: var(--ink); font-weight: 500; }
.tension-row__label{
  display: block;
  font-family: var(--mono); font-size: 12px; letter-spacing: 0.22em;
  text-transform: uppercase; font-weight: 700;
  margin-bottom: 4px;
}
.tension-row__intent{ padding: 8px 10px; background: var(--c-intention-soft); border-left: 3px solid var(--c-intention); border-radius: 6px; }
.tension-row__intent .tension-row__label{ color: var(--c-intention); }
.tension-row__reality{ padding: 8px 10px; background: var(--c-reality-soft); border-left: 3px solid var(--c-reality); border-radius: 6px; }
.tension-row__reality .tension-row__label{ color: var(--c-reality); }
.tension-row p{ margin: 0; font-family: var(--serif); font-size: 13.5px; color: var(--ink-2); line-height: 1.4; }
.tension-row__sep{
  align-self: center;
  font-size: 18px; color: var(--ink-3);
}
.tension-row__empty{ color: var(--muted); font-size: 12px; }
.tension-row__resolve{
  grid-column: 1 / -1;
  display: flex; gap: 8px; align-items: flex-start;
  padding: 8px 10px;
  background: var(--c-nt-soft);
  border-left: 3px solid var(--c-nt);
  border-radius: 6px;
}
.tension-row__resolve-glyph{ color: var(--c-nt); font-size: 16px; }
.tension-row__resolve p{ margin: 0; font-family: var(--serif); font-style: italic; font-size: 13.5px; color: var(--ink-2); }

/* Cloze */
.cloze{
  background: var(--c-promises-soft);
  border-left: 3px solid var(--c-promises);
  border-radius: 8px;
  padding: 10px 12px;
  display: flex; flex-direction: column; gap: 8px;
  margin: 6px 0;
}
.cloze__label{
  font-family: var(--mono); font-size: 12px; letter-spacing: 0.22em;
  text-transform: uppercase; color: var(--c-promises); font-weight: 700;
}
.cloze__sentence{
  font-family: var(--serif); font-size: 14.5px; color: var(--ink);
  margin: 0; line-height: 1.4;
}
.cloze__row{ display: flex; flex-wrap: wrap; align-items: center; gap: 8px; }
.cloze__input{
  flex: 1; min-width: 160px;
  font-family: var(--serif); font-size: 14px;
  background: var(--bg-card); border: 1px solid var(--rule);
  border-radius: 6px; padding: 6px 10px;
  color: var(--ink);
}
.cloze__input:focus{ outline: none; border-color: var(--c-promises); }
.cloze__input.is-right{ border-color: var(--c-nt); background: var(--c-nt-soft); }
.cloze__input.is-wrong{ border-color: var(--c-salvation); background: var(--c-salvation-soft); }
.cloze__verdict{ font-family: var(--mono); font-size: 12px; letter-spacing: 0.06em; }
.cloze__verdict.is-right{ color: var(--c-nt); }
.cloze__verdict.is-wrong{ color: var(--c-salvation); }

/* Quiz */
.quiz{
  background: var(--bg-card-2);
  border-left: 3px solid var(--c-intention);
  border-radius: 8px;
  padding: 10px 12px;
  display: flex; flex-direction: column; gap: 8px;
}
.quiz__label{
  font-family: var(--mono); font-size: 12px; letter-spacing: 0.22em;
  text-transform: uppercase; color: var(--c-intention); font-weight: 700;
}
.quiz__text{
  font-family: var(--serif); font-style: italic; font-size: 14px;
  color: var(--ink-2); margin: 0; line-height: 1.4;
}
.quiz__opts{ display: flex; flex-wrap: wrap; gap: 6px; }
.quiz__opt{
  appearance: none; border: 1px solid var(--rule); background: var(--bg-card);
  border-radius: 99px; padding: 4px 12px;
  font-family: var(--sans); font-size: 12px; color: var(--ink-2);
  cursor: pointer; display: inline-flex; align-items: center; gap: 4px;
  transition: background 120ms, color 120ms, border-color 120ms;
}
.quiz__opt:hover:not([disabled]){ border-color: var(--theme-color); color: var(--theme-color); }
.quiz__opt.is-right{ background: var(--c-nt); color: #f5efe1; border-color: var(--c-nt); }
.quiz__opt.is-wrong{ background: var(--c-salvation); color: #f5efe1; border-color: var(--c-salvation); }
.quiz__opt[disabled]{ cursor: default; opacity: 0.7; }
.quiz__verdict{
  font-family: var(--mono); font-size: 12px; letter-spacing: 0.06em;
  color: var(--ink-3); margin: 0;
}

/* Divisions list (3J) */
.divisions{
  background: var(--bg-card-2);
  border-radius: 8px;
  padding: 10px 12px;
  display: flex; flex-direction: column; gap: 8px;
}
.divisions__label{
  font-family: var(--mono); font-size: 12px; letter-spacing: 0.22em;
  text-transform: uppercase; color: var(--ink-3); font-weight: 700;
}
.divisions__list{
  margin: 0; padding-left: 0; list-style: none;
  display: flex; flex-direction: column; gap: 6px;
}
.divisions__item{
  display: flex; flex-wrap: wrap; align-items: baseline; gap: 8px;
  padding: 6px 8px; background: var(--bg-card); border-radius: 6px;
  border-left: 2px solid var(--ink-3);
}
.divisions__title{
  font-family: var(--serif); font-size: 13.5px; color: var(--ink-2);
}

/* Further-study chips */
.further-study{
  display: flex; flex-direction: column; gap: 6px;
}
.further-study__label{
  font-family: var(--mono); font-size: 12px; letter-spacing: 0.22em;
  text-transform: uppercase; color: var(--ink-3); font-weight: 700;
}
.further-study__chips{ display: flex; flex-wrap: wrap; gap: 6px; }
.further-study__chip{
  display: inline-flex; align-items: center; gap: 4px;
  padding: 4px 12px; border-radius: 99px;
  background: var(--bg-card); border: 1px solid var(--rule);
  font-family: var(--sans); font-size: 12px;
  color: var(--ink-2); text-decoration: none;
  transition: background 160ms, color 160ms, border-color 160ms;
}
.further-study__chip:hover{ background: var(--ink); color: #f5efe1; border-color: var(--ink); }
.further-study__glyph{ font-size: 12px; }

/* Passage refs — clickable chips */
.passage-refs{ display: inline-flex; flex-wrap: wrap; gap: 4px; }
.passage-ref{
  display: inline-flex; align-items: baseline; gap: 4px;
  padding: 2px 8px; border-radius: 4px;
  background: var(--bg-card-2);
  font-family: var(--serif); font-style: italic; font-size: 15px;
  color: var(--c-promises); text-decoration: none;
  border-bottom: 1px dotted var(--c-promises);
  transition: background 120ms, color 120ms;
}
.passage-ref:hover{ background: var(--c-promises); color: #f5efe1; }

/* Spaced rep badge */
.spacedrep{
  display: inline-flex; align-items: center; gap: 6px;
  margin-top: 8px;
  padding: 4px 10px;
  background: var(--c-salvation-soft);
  border: 1px solid var(--c-salvation);
  border-radius: 99px;
  font-family: var(--mono); font-size: 12px; letter-spacing: 0.06em;
  color: var(--c-salvation); font-weight: 600;
}
.spacedrep__dot{
  width: 6px; height: 6px; border-radius: 99px; background: var(--c-salvation);
  animation: pulse 2s infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}

/* Recap card new rows */
.recap-card__row--verse{
  background: var(--bg-card-2);
  border-left: 3px solid var(--ink-3);
  padding: 8px 12px; border-radius: 6px;
}
.recap-card__verse{
  font-family: var(--serif); font-style: italic; font-size: 14px;
  color: var(--ink-2); margin: 0; line-height: 1.4;
}
.recap-card__row--apply{
  background: var(--c-kingdom-soft);
  border-left: 3px solid var(--c-kingdom);
  padding: 10px 12px; border-radius: 6px;
}
.recap-card__apply{
  font-family: var(--serif); font-size: 14.5px; color: var(--ink); margin: 0; line-height: 1.45;
}
.recap-card__row--presenter{
  background: var(--bg-warm);
  border: 1px dashed var(--ink-3);
  padding: 10px 12px; border-radius: 6px;
}
.recap-card__presenter{
  font-family: var(--sans); font-size: 13px; color: var(--ink-2);
  margin: 0; white-space: pre-line; line-height: 1.5;
}

/* Mobile-ish responsive */
@media (max-width: 920px){
  .tension-row{ grid-template-columns: 1fr; gap: 8px; }
  .tension-row__sep{ display: none; }
  .thread-compass{ top: auto; bottom: 80px; right: 8px; left: 8px; max-width: none; }
}



/* Recap collapsible sub-sections (v4) */
.recap-collapse{
  background: var(--bg-card-2);
  border: 1px dashed var(--rule-2);
  border-radius: 8px;
  display: flex; flex-direction: column;
  overflow: hidden;
}
.recap-collapse.is-open{ border-style: solid; }
.recap-collapse__toggle{
  appearance: none; border: 0; background: transparent;
  display: flex; align-items: center; gap: 8px;
  padding: 9px 12px; width: 100%; text-align: left; cursor: pointer;
}
.recap-collapse__toggle:hover .recap-collapse__label{ color: var(--ink); }
.recap-collapse__chev{ width: 12px; text-align: center; color: var(--ink-3); font-size: 12px; }
.recap-collapse__label{
  font-family: var(--mono); font-size: 12px; letter-spacing: 0.22em;
  text-transform: uppercase; color: var(--ink-3); font-weight: 700;
}
.recap-collapse__hint{
  margin-left: auto;
  font-family: var(--serif); font-style: italic; font-size: 12px; color: var(--muted);
}
.recap-collapse__body{ padding: 0 12px 12px; display: flex; flex-direction: column; gap: 10px; }



/* Covenants teaser (subway view → points into Promises sub-thread) */
.cov-teaser{
  display: flex; align-items: center; gap: 12px;
  width: 100%;
  margin: 4px 0 16px;
  padding: 12px 18px;
  background: linear-gradient(180deg, var(--c-promises-soft), var(--bg-card) 90%);
  border: 1px solid var(--c-promises);
  border-left: 4px solid var(--c-promises);
  border-radius: 12px;
  cursor: pointer;
  text-align: left;
  transition: box-shadow 160ms, transform 120ms;
}
.cov-teaser:hover{ box-shadow: var(--shadow-soft); transform: translateY(-1px); }
.cov-teaser__glyph{ font-size: 18px; color: var(--c-promises); }
.cov-teaser__text{ font-family: var(--serif); font-size: 15px; color: var(--ink-2); }
.cov-teaser__cta{
  margin-left: auto;
  font-family: var(--mono); font-size: 12px; letter-spacing: 0.14em;
  text-transform: uppercase; color: var(--c-promises); font-weight: 700;
  white-space: nowrap;
}

/* Covenants as a sub-theme inside the Promises thread story */
.subtheme--cov{ }
.covsub{
  display: flex; flex-direction: column; gap: 14px;
}
.covsub__stage{
  background: var(--cov-soft, var(--bg-card-2));
  border: 1px solid var(--cov-accent, var(--rule));
  border-radius: 12px;
  padding: 14px 16px;
}
.covsub__stagehead{
  display: flex; align-items: flex-start; gap: 12px;
  margin-bottom: 12px;
}
.covsub__stagenum{
  flex: none;
  width: 28px; height: 28px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 99px;
  background: var(--cov-accent, var(--ink));
  color: #f5efe1;
  font-family: var(--mono); font-size: 13px; font-weight: 700;
}
.covsub__stagemeta{ flex: 1; }
.covsub__stagetitle{
  font-family: var(--serif); font-weight: 500; font-size: 18px;
  margin: 0; color: var(--ink); line-height: 1.15;
}
.covsub__stageblurb{
  font-family: var(--serif); font-style: italic; font-size: 13.5px;
  color: var(--ink-2); margin: 4px 0 0; line-height: 1.4;
}
.covsub__items{
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
  gap: 8px;
}



/* ✝ NT-fulfilment marker on covenant signs */
.covchip__nt{
  display: flex; align-items: baseline; gap: 5px;
  margin-top: 7px; padding-top: 6px;
  border-top: 1px dashed var(--c-nt);
  font-family: var(--serif); font-size: 12px;
  color: var(--c-nt); line-height: 1.3; text-align: left;
}
.covchip__nt-glyph{ font-size: 12px; flex: none; }
.covchip__nt-text{ font-style: italic; }



/* ============ v7 animations & graphics ============ */

/* A. Subway thread-tracing: active rail draws itself */
.srail{ transition: opacity 220ms ease, stroke-width 220ms ease; }
.srail.is-active{
  stroke-dasharray: 1;
  animation: railDraw 760ms ease forwards;
}
@keyframes railDraw{ from{ stroke-dashoffset: 1; } to{ stroke-dashoffset: 0; } }

/* H. Station pop when a thread lights up */
.station.is-thread-on .station__dot{ animation: stationPop 460ms ease; }
@keyframes stationPop{ 0%{ transform: scale(1); } 42%{ transform: scale(1.55); } 100%{ transform: scale(1); } }

/* B. Covenant stage cascade (made → sealed → signed) */
.covsub__stage{ animation: covRise 520ms ease both; }
.covsub__stage:nth-child(1){ animation-delay: 60ms; }
.covsub__stage:nth-child(2){ animation-delay: 210ms; }
.covsub__stage:nth-child(3){ animation-delay: 360ms; }
@keyframes covRise{ from{ opacity: 0; transform: translateY(12px); } to{ opacity: 1; transform: none; } }

/* C. Theme-glyph watermark behind thread story */
.thread{ position: relative; overflow: hidden; }
.thread__watermark{
  position: absolute; top: -24px; right: 8px;
  font-size: 230px; line-height: 1;
  color: var(--theme-color);
  opacity: 0.06; pointer-events: none; z-index: 0;
  user-select: none;
}
.thread > *:not(.thread__watermark){ position: relative; z-index: 1; }

/* D. Recap reveal: sections stagger in */
.recap-card__reveal > *{ animation: recapFade 380ms ease both; }
.recap-card__reveal > *:nth-child(1){ animation-delay: 0ms; }
.recap-card__reveal > *:nth-child(2){ animation-delay: 60ms; }
.recap-card__reveal > *:nth-child(3){ animation-delay: 120ms; }
.recap-card__reveal > *:nth-child(4){ animation-delay: 180ms; }
.recap-card__reveal > *:nth-child(5){ animation-delay: 240ms; }
.recap-card__reveal > *:nth-child(6){ animation-delay: 300ms; }
.recap-card__reveal > *:nth-child(7){ animation-delay: 360ms; }
.recap-card__reveal > *:nth-child(n+8){ animation-delay: 420ms; }

/* E. Tension view: Christ resolution slides up beneath the pair */
.tension-row__resolve{ animation: resolveUp 520ms ease both; }
@keyframes resolveUp{ from{ opacity: 0; transform: translateY(10px); } to{ opacity: 1; transform: none; } }

/* G. Redemptive-arc ribbon behind the subway (Creation→Fall→Covenants→Christ) */
.subway-wrap{ position: relative; }
.subway-wrap::before{
  content: '';
  position: absolute; inset: 0;
  border-radius: 16px;
  pointer-events: none; z-index: 0;
  background: linear-gradient(90deg,
    oklch(0.93 0.07 95 / 0.30) 0%,    /* Creation — warm light */
    oklch(0.55 0.05 55 / 0.16) 24%,   /* Fall — shadowed clay */
    oklch(0.55 0.07 250 / 0.12) 52%,  /* Covenants — blue, lifting */
    oklch(0.66 0.08 160 / 0.16) 82%,  /* toward fulfilment */
    oklch(0.90 0.12 160 / 0.30) 100%  /* Christ — luminous emerald */
  );
  -webkit-mask-image: linear-gradient(180deg, transparent 0, #000 14%, #000 86%, transparent 100%);
          mask-image: linear-gradient(180deg, transparent 0, #000 14%, #000 86%, transparent 100%);
}
.subway-wrap > *{ position: relative; z-index: 1; }

/* F. Covenant-sign icons */
.covicon{
  width: 22px; height: 22px;
  color: var(--cov-accent, var(--c-nt));
  display: block; margin-bottom: 6px;
}

/* count-up just animates the text node; no extra style needed */

/* Respect reduced-motion preferences */
@media (prefers-reduced-motion: reduce){
  .srail.is-active,
  .station.is-thread-on .station__dot,
  .covsub__stage,
  .recap-card__reveal > *,
  .tension-row__resolve{
    animation: none !important;
  }
}



/* ============ v8: journey map, ring, trunk, scarlet thread ============ */

/* Journey / ANE map */
.journey{ margin-top: 8px; }
.journey__head{
  padding: 18px 22px; background: var(--bg-card);
  border: 1px solid var(--rule); border-radius: 14px; margin-bottom: 14px;
}
.journey__eyebrow{
  font-family: var(--mono); font-size: 12px; letter-spacing: 0.22em;
  text-transform: uppercase; color: var(--c-kingdom); font-weight: 700;
}
.journey__title{
  font-family: var(--serif); font-weight: 500; font-size: 28px;
  margin: 6px 0 4px; color: var(--ink); letter-spacing: -0.01em;
}
.journey__lede{ font-family: var(--serif); font-style: italic; font-size: 15px; color: var(--ink-2); margin: 0; max-width: 70ch; }

.journey__mapwrap{
  background:
    radial-gradient(1200px 700px at 30% 20%, oklch(0.95 0.04 90 / 0.5), transparent 70%),
    var(--bg-card);
  border: 1px solid var(--rule); border-radius: 14px;
  padding: 10px; box-shadow: var(--shadow-soft);
  overflow: hidden;
}
.journey__map{ width: 100%; height: auto; display: block; }
.jwater{ fill: oklch(0.78 0.07 230 / 0.45); stroke: oklch(0.62 0.08 230 / 0.5); stroke-width: 1.2; }
.jriver{ fill: none; stroke: oklch(0.62 0.08 230 / 0.6); stroke-width: 2.4; stroke-linecap: round; }
.jregion{
  fill: var(--ink-3); font-family: var(--mono); font-size: 17px;
  letter-spacing: 0.32em; opacity: 0.5; font-weight: 700;
}
.jregion--sm{ font-size: 12px; letter-spacing: 0.22em; }
.jsea{ fill: oklch(0.45 0.08 250); font-family: var(--serif); font-style: italic; font-size: 18px; opacity: 0.7; }
.jsea--sm{ font-size: 13px; }
.jcompass{ fill: none; stroke: var(--ink-3); stroke-width: 1.2; opacity: 0.5; }
.jcompass circle{ fill: none; }
.jcompass path{ fill: var(--ink-3); stroke: none; }
.jcompass text{ fill: var(--ink-3); font-family: var(--mono); font-size: 12px; stroke: none; }

.journey__route{
  stroke: var(--c-salvation); stroke-width: 2.6;
  stroke-dasharray: 3 7; stroke-linecap: round;
  opacity: 0.85;
  animation: journeyDraw 1600ms ease forwards;
}
@keyframes journeyDraw{
  from{ stroke-dashoffset: 1; stroke-dasharray: 1; }
  to{ stroke-dashoffset: 0; stroke-dasharray: 3 7; }
}
.jplace{ cursor: pointer; }
.jplace__halo{ fill: var(--c-kingdom); opacity: 0.18; transition: r 160ms, opacity 160ms; }
.jplace__dot{ fill: var(--c-kingdom); stroke: var(--bg-card); stroke-width: 2; transition: r 160ms; }
.jplace.is-sel .jplace__halo{ fill: var(--c-salvation); opacity: 0.3; }
.jplace.is-sel .jplace__dot{ fill: var(--c-salvation); }
.jplace:hover .jplace__halo{ opacity: 0.32; }
.jplace__label{
  fill: var(--ink); font-family: var(--serif); font-size: 19px; font-weight: 500;
  paint-order: stroke; stroke: var(--bg-card); stroke-width: 4px; stroke-linejoin: round;
}

.journey__legend{
  display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
  gap: 8px; margin-top: 14px;
}
.journey__chip{
  display: flex; gap: 10px; align-items: flex-start;
  text-align: left; cursor: pointer;
  background: var(--bg-card); border: 1px solid var(--rule);
  border-radius: 10px; padding: 10px 12px;
  transition: box-shadow 140ms, transform 120ms, border-color 140ms;
}
.journey__chip:hover{ box-shadow: var(--shadow-soft); transform: translateY(-1px); }
.journey__chip.is-sel{ border-color: var(--c-salvation); background: var(--c-salvation-soft); }
.journey__chip-step{
  flex: none; width: 24px; height: 24px; border-radius: 99px;
  background: var(--c-kingdom); color: #f5efe1;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--mono); font-size: 12px; font-weight: 700;
}
.journey__chip-body{ display: flex; flex-direction: column; gap: 2px; }
.journey__chip-body b{ font-family: var(--serif); font-size: 15px; color: var(--ink); }
.journey__chip-sess{ font-family: var(--mono); font-size: 12px; letter-spacing: 0.12em; color: var(--ink-3); }
.journey__chip-note{ font-family: var(--serif); font-style: italic; font-size: 12.5px; color: var(--ink-2); margin-top: 2px; }

/* Recap progress ring */
.recap__ring{ position: relative; width: 56px; height: 56px; }
.recap__ring svg{ width: 56px; height: 56px; transform: rotate(-90deg); }
.recap__ring-bg{ fill: none; stroke: var(--rule); stroke-width: 5; }
.recap__ring-fg{
  fill: none; stroke: var(--c-nt); stroke-width: 5; stroke-linecap: round;
  transition: stroke-dashoffset 600ms ease;
}
.recap__ring-num{
  position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
  font-family: var(--mono); font-size: 12px; font-weight: 700; color: var(--ink-2);
}

/* Covenant trunk — a connecting spine the stages grow from */
.covsub{ position: relative; padding-left: 20px; }
.covsub::before{
  content: ''; position: absolute; left: 7px; top: 14px; bottom: 14px;
  width: 2px; background: linear-gradient(180deg, var(--c-promises), var(--c-nt));
  opacity: 0.35; border-radius: 2px;
}
.covsub__stage{ position: relative; }
.covsub__stage::before{
  content: ''; position: absolute; left: -17px; top: 22px;
  width: 10px; height: 10px; border-radius: 99px;
  background: var(--cov-accent, var(--c-promises));
  box-shadow: 0 0 0 3px var(--bg-card);
}

/* Scarlet thread (Salvation thread story) */
.scarlet{
  display: flex; align-items: center; gap: 12px;
  margin-top: 12px; padding: 8px 0;
}
.scarlet__line{
  flex: none; width: 60px; height: 3px; border-radius: 3px;
  background: repeating-linear-gradient(90deg, var(--c-salvation) 0 8px, transparent 8px 12px);
  position: relative;
}
.scarlet__note{
  font-family: var(--serif); font-style: italic; font-size: 14px;
  color: var(--ink-2); margin: 0;
}

@media (prefers-reduced-motion: reduce){
  .journey__route{ animation: none !important; stroke-dasharray: 3 7 !important; stroke-dashoffset: 0 !important; }
}
@media (max-width: 720px){
  .jplace__label{ font-size: 24px; }
  .jregion{ font-size: 20px; }
}



/* ============ v9 design tweaks ============ */

/* 1. Apply-this-week — distinct orange collapsible */
.recap-collapse--apply{
  background: oklch(0.93 0.06 65 / 0.7);
  border: 1px solid oklch(0.64 0.13 52);
  border-left: 4px solid oklch(0.64 0.13 52);
}
.recap-collapse--apply .recap-collapse__label,
.recap-collapse--apply .recap-collapse__chev{ color: oklch(0.50 0.15 48); }
.recap-collapse--apply .recap-collapse__hint{ color: oklch(0.55 0.10 52); }
.recap-collapse--apply .recap-card__apply{
  font-family: var(--serif); font-size: 16px; color: var(--ink); margin: 0; line-height: 1.5;
}

/* 2. Journey map — numbers + arrows */

  fill: #f5efe1; font-family: var(--mono); font-size: 14px; font-weight: 700;
  pointer-events: none;
}

/* 3. Tension NT fulfilment — bigger, clearer */
.tension-row__resolve{
  background: var(--c-nt-soft);
  border-left: 4px solid var(--c-nt);
  padding: 12px 14px;
  align-items: flex-start;
  gap: 12px;
}

.tension-row__resolve-body{ display: flex; flex-direction: column; gap: 3px; }
.tension-row__resolve-label{
  font-family: var(--mono); font-size: 12px; letter-spacing: 0.22em;
  text-transform: uppercase; color: var(--c-nt); font-weight: 700;
}
.tension-row__resolve p{
  margin: 0; font-family: var(--serif); font-style: normal;
  font-size: 16.5px; color: var(--ink); line-height: 1.5;
}

/* 4. Session-1 overview boxes */
.overview-thread__desc{
  font-family: var(--serif); font-size: 14.5px; color: var(--ink-2);
  line-height: 1.5; margin: 8px 0 4px;
}
.overview-thread__covnote{
  display: flex; gap: 8px; align-items: flex-start;
  margin: 8px 0; padding: 8px 10px;

  border-left: 3px solid var(--c-promises);

}

}

}

/* 5. Guided tour */
.tour-trigger{
  display: inline-flex; align-items: center; gap: 8px;
  margin-top: 16px;
  padding: 9px 16px;
  background: var(--ink); color: #f5efe1;
  border: 0; border-radius: 99px; cursor: pointer;
  font-family: var(--sans); font-size: 12.5px; font-weight: 600; letter-spacing: 0.02em;
  box-shadow: var(--shadow-soft);
  transition: transform 120ms, background 160ms;
}
.tour-trigger:hover{ transform: translateY(-1px); background: var(--c-promises); }
.tour-trigger__glyph{ color: var(--c-kingdom); }
.tour-trigger:hover .tour-trigger__glyph{ color: #f5efe1; }

.tour{
  position: fixed; inset: 0; z-index: 1100;
  background: rgba(29,24,18,0.6); backdrop-filter: blur(5px);
  display: flex; align-items: center; justify-content: center;
  animation: recapFade 200ms ease;
}
.tour__card{
  width: min(540px, 92vw);
  background: var(--bg-card);

}
.tour__close{ appearance: none; border: 0; background: transparent; font-size: 22px; color: var(--ink-3); cursor: pointer; }
.tour__close:hover{ color: var(--ink); }
.tour__glyph{
  display: block; font-size: 40px; color: var(--c-kingdom); margin: 12px 0 4px;
}
.tour__title{
  font-family: var(--serif); font-weight: 500; font-size: 25px; color: var(--ink);
  margin: 4px 0 10px; line-height: 1.15;
}
.tour__body{
  font-family: var(--serif); font-size: 16px; color: var(--ink-2);
  line-height: 1.5; margin: 0 auto 16px; max-width: 44ch;
}
.tour__dots{ display: flex; justify-content: center; gap: 6px; margin-bottom: 16px; }
.tour__dot{
  width: 8px; height: 8px; border-radius: 99px; border: 0;
  background: var(--rule); cursor: pointer; padding: 0;
}
.tour__dot.is-on{ background: var(--c-kingdom); width: 22px; border-radius: 99px; }
.tour__foot{ display: flex; justify-content: space-between; gap: 12px; }



/* ============ v10 tweaks ============ */

/* 1. Guided tour — docked panel + section highlight */
.tourdock{
  position: fixed; left: 50%; transform: translateX(-50%); bottom: 24px;
  z-index: 1100; width: min(560px, 94vw);
  animation: recapFade 240ms ease;
}
.tourdock__card{
  background: var(--bg-card); border: 1px solid var(--rule);
  border-top: 4px solid var(--c-kingdom); border-radius: 16px;
  box-shadow: var(--shadow-deep); padding: 16px 20px 14px;
}
.tourdock__head{ display: flex; align-items: center; gap: 10px; }
.tourdock__glyph{ font-size: 22px; color: var(--c-kingdom); }
.tourdock__step{ font-family: var(--mono); font-size: 12px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--ink-3); font-weight: 700; }
.tourdock__close{ margin-left: auto; appearance: none; border: 0; background: transparent; font-size: 20px; color: var(--ink-3); cursor: pointer; }
.tourdock__close:hover{ color: var(--ink); }
.tourdock__title{ font-family: var(--serif); font-weight: 500; font-size: 22px; color: var(--ink); margin: 8px 0 6px; line-height: 1.15; }
.tourdock__body{ font-family: var(--serif); font-size: 15px; color: var(--ink-2); line-height: 1.5; margin: 0 0 12px; }
.tourdock__body b{ color: var(--ink); font-weight: 700; }
.tourdock__dots{ display: flex; gap: 6px; margin-bottom: 12px; }
.tourdock__foot{ display: flex; justify-content: space-between; gap: 12px; }

.tour-highlight{
  outline: 3px solid var(--c-kingdom);
  outline-offset: 4px;
  border-radius: 12px;
  scroll-margin: 140px;
  animation: tourPulse 1.6s ease-in-out infinite;
  position: relative; z-index: 1001;
}
@keyframes tourPulse{
  0%,100%{ box-shadow: 0 0 0 5px oklch(0.64 0.13 75 / 0.12), 0 0 22px oklch(0.64 0.13 75 / 0.22); }
  50%{ box-shadow: 0 0 0 8px oklch(0.64 0.13 75 / 0.22), 0 0 46px oklch(0.64 0.13 75 / 0.42); }
}
/* Tour backdrop: a soft dim on the periphery only — NO blur — so the page text
   the tour refers to stays fully readable. The highlighted target is lifted to
   z-index 1001 (above this dim) and the dock to 1100, so both stay sharp. */
.tour-scrim{
  position: fixed; inset: 0; z-index: 1000;
  background: rgba(28,24,16,0.16);
  pointer-events: none;
  animation: recapFade 240ms ease;
}

/* 2. Session-01 sub-thread boxes (One Man + Covenants) */
.overview-thread__subbox{
  display: flex; gap: 8px; align-items: flex-start;
  margin: 8px 0; padding: 9px 11px;
  background: var(--theme-soft);
  border-left: 3px solid var(--theme-color);
  border-radius: 7px;
  font-family: var(--serif); font-size: 13px; color: var(--ink-2); line-height: 1.45;
}
.overview-thread__subbox-hook{ color: var(--theme-color); font-weight: 700; flex: none; }
.overview-thread__subbox b{ color: var(--ink); font-style: normal; }
.overview-thread__subbox-figs{ display: block; margin-top: 4px; font-style: italic; color: var(--ink-3); font-size: 12px; }

/* 3. "Christ, the Perfect Man" resolution — more visible */
.subtheme__resolution-label{ font-size: 12.5px; }
.subtheme__resolution-text{
  font-size: 17px; font-style: normal; font-weight: 500;
  color: var(--ink); line-height: 1.5;
}

/* 4. Apply this week — content box styled like Cloze/Quiz, in orange */
.recap-card__apply{
  background: oklch(0.93 0.06 65 / 0.7);
  border-left: 3px solid oklch(0.64 0.13 52);
  border-radius: 8px;
  padding: 10px 12px;
  font-family: var(--serif); font-size: 15px; color: var(--ink);
  margin: 0; line-height: 1.5;
}

.sidenav.is-hovered .sidenav__title{ opacity: 1; }

  display: flex; align-items: center; gap: 10px;

.sidenav__item:hover{ background: var(--bg-card-2); }
.sidenav__item.is-disabled{ opacity: 0.4; cursor: default; }
.sidenav__item.is-disabled:hover{ background: transparent; }
.sidenav__item.is-active{ background: var(--bg-card-2); }
.sidenav__glyph{

.sidenav__badge{

.sidenav__body{ display: flex; flex-direction: column; gap: 1px; opacity: 0; transition: opacity 160ms; min-width: 0; }
.sidenav.is-hovered .sidenav__body{ opacity: 1; }
.sidenav__label{ font-family: var(--sans); font-size: 13px; font-weight: 600; color: var(--ink); }
.sidenav__sel{

@media (max-width: 1040px){ .sidenav{ display: none; } }



/* ============ v12 mobile side-nav ============ */
.sidenav__topline{ display: flex; align-items: center; justify-content: space-between; }
.sidenav__close{
