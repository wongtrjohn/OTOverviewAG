/* ════════════════════════════════════════════════════════
   HOME SCREEN — Option A mode-chooser landing
   ════════════════════════════════════════════════════════ */

.home-screen {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 52px 40px 40px;
  box-sizing: border-box;
}

/* Header */
.home-screen__header {
  text-align: center;
  max-width: 660px;
  width: 100%;
  margin-bottom: 44px;
}
.home-screen__eyebrow {
  font-size: 10.5px;
  letter-spacing: .14em;
  color: #7c6535;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  margin-bottom: 20px;
}
.home-screen__title {
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-size: clamp(30px, 4vw, 48px);
  font-weight: 600;
  line-height: 1.18;
  color: #29261b;
  margin-bottom: 18px;
}
.home-screen__title em {
  font-style: italic;
  color: #5c4a1e;
}
.home-screen__sub {
  font-size: 15px;
  color: #5c4332;
  line-height: 1.75;
  margin-bottom: 22px;
  max-width: 560px;
  margin-left: auto;
  margin-right: auto;
}
.home-screen__sub strong { color: #3a2e10; }

/* Guided-tour reopen button on the Mode Chooser */
.home-tour-btn{
  display: inline-flex; align-items: center; gap: 8px;
  margin: 0 auto 22px; padding: 11px 22px;
  font-family: var(--sans, 'Manrope', sans-serif);
  font-size: 13.5px; font-weight: 700; letter-spacing: 0.03em;
  color: #fff; cursor: pointer;
  background: linear-gradient(135deg, #b5894a 0%, #a4423a 100%);
  border: 0;
  border-radius: 999px;
  box-shadow: 0 4px 16px rgba(164,66,58,0.35);
  animation: tourBtnPulse 2.4s ease-in-out infinite;
  transition: transform 160ms ease, box-shadow 160ms ease;
}
.home-tour-btn:hover{
  transform: translateY(-2px) scale(1.02);
  box-shadow: 0 7px 22px rgba(164,66,58,0.45);
  animation: none;
}
@keyframes tourBtnPulse{
  0%, 100% { box-shadow: 0 4px 16px rgba(164,66,58,0.30); }
  50%      { box-shadow: 0 4px 22px rgba(181,137,74,0.55); }
}
@media (prefers-reduced-motion: reduce){ .home-tour-btn{ animation: none; } }
.home-tour-btn__icon{ font-size: 15px; line-height: 1; }

.home-screen__weave {
  height: 28px;
  max-width: 480px;
  width: 100%;
  margin: 0 auto;
  display: block;
}
.home-screen__weave svg { width: 100%; height: 100%; }

/* 2 × 2 grid */
.home-screen__grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 18px;
  width: 100%;
  max-width: 820px;
}

/* Mode card */
.home-card {
  background: #fdf8f0;
  border: 1px solid #d4b87a;
  border-radius: 14px;
  padding: 30px 30px 24px;
  text-align: left;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  gap: 10px;
  min-height: 210px;
  transition: border-color .15s, background .12s, box-shadow .15s, transform .12s;
  font-family: inherit;
}
.home-card:hover {
  border-color: #b5894a;
  background: #fef9f2;
  box-shadow: 0 4px 18px rgba(92, 74, 30, .10);
  transform: translateY(-3px);
}
.home-card:active { transform: translateY(-1px); }

.home-card__glyph {
  font-size: 30px;
  line-height: 1;
  color: #7c6535;
  display: block;
  margin-bottom: 4px;
}
.home-card__title {
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-size: 23px;
  font-weight: 600;
  color: #29261b;
  line-height: 1.15;
  display: block;
}
.home-card__desc {
  font-size: 13px;
  color: #5c4332;
  line-height: 1.65;
  flex: 1;
  margin: 0;
}
.home-card__cta {
  font-size: 12px;
  color: #b5894a;
  font-weight: 500;
  letter-spacing: .025em;
  margin-top: 6px;
  display: block;
}

/* Featured card — Recap Mode */
.home-card--featured {
  background: #2e2208;
  border-color: #4a3810;
}
.home-card--featured:hover {
  background: #231a06;
  border-color: #b5894a;
  box-shadow: 0 4px 22px rgba(26,16,4,.35);
}
.home-card--featured .home-card__glyph { color: #d4b87a; font-size: 34px; }
.home-card--featured .home-card__title { color: #f5edd6; }
.home-card--featured .home-card__desc  { color: #c4a87a; }
.home-card--featured .home-card__cta  { color: #d4b87a; }

/* Footer */
.home-screen__foot {
  margin-top: 36px;
  font-size: 11px;
  color: #9c8555;
  letter-spacing: .05em;
  text-align: center;
}

/* Back-to-home bar (shown on inner views) */
.home-back-bar {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 20px 0;
}
.home-back-bar__btn { font-size: 12px !important; }
.home-back-bar__crumb {
  font-size: 10px;
  letter-spacing: .10em;
  color: #9c8555;
}

/* ── Responsive: stack to 1 column on narrow screens ── */
@media (max-width: 560px) {
  .home-screen { padding: 32px 20px 28px; }
  .home-screen__grid { grid-template-columns: 1fr; gap: 12px; }
  .home-card { min-height: 160px; padding: 22px 20px 18px; }
  .home-screen__title { font-size: 28px; }
  .home-screen__header { margin-bottom: 28px; }
}

/* ── Progress ring ─────────────────────────────────────────────── */
.prog-ring {
  position: relative;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.prog-ring__label {
  position: absolute;
  font-size: 9px;
  font-weight: 600;
  line-height: 1;
  text-align: center;
  pointer-events: none;
}

/* ── Picker header with overall ring ───────────────────────────── */
.rc-picker__head-top {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 16px;
}
.rc-picker__overall {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  flex-shrink: 0;
}
.rc-picker__overall-label {
  font-size: 9px;
  color: #9c8555;
  text-align: center;
  line-height: 1.3;
  letter-spacing: .04em;
}
.rc-picker__prog {
  display: flex;
  align-items: center;
  margin-left: auto;
  flex-shrink: 0;
}

/* ── Apply This Week input ─────────────────────────────────────── */
.rc-apply__input-wrap {
  display: flex;
  flex-direction: column;
  gap: 6px;
  margin-top: 14px;
  border-top: 1px solid rgba(180,150,80,.18);
  padding-top: 14px;
}
.rc-apply__input-label {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: .07em;
  color: #7c6535;
  text-transform: uppercase;
}
.rc-apply__input {
  width: 100%;
  box-sizing: border-box;
  border: 1.5px solid #d4b87a;
  border-radius: 8px;
  padding: 10px 12px;
  font-family: inherit;
  font-size: 14px;
  color: #29261b;
  background: #fdf8f0;
  resize: vertical;
  min-height: 90px;
  transition: border-color .15s;
  line-height: 1.6;
}
.rc-apply__input:focus {
  outline: none;
  border-color: #b5894a;
  background: #fff;
}
.rc-apply__input::placeholder { color: #b8a07a; }

/* ── HomeScreen v2 ─────────────────────────────────────────────────── */
.home-screen__progress {
  display: flex; align-items: center; gap: 14px;
  justify-content: center; margin: 22px auto 0;
  padding: 14px 24px; max-width: 300px;
  background: rgba(181,137,74,0.1); border-radius: 14px;
  border: 1px solid rgba(181,137,74,0.25);
}
.home-screen__progress-label {
  font-family: var(--sans); font-size: 13px; color: #5c4a1e;
  font-weight: 500; line-height: 1.35; text-align: left;
}
.home-screen__layout {
  display: flex; flex-direction: column; gap: 18px;
  width: 100%; max-width: 820px;
}
.home-card--intro-hero {
  background: linear-gradient(135deg, #fdf5e4 0%, #f9edcc 100%);
  border: 2px solid #b5894a; border-radius: 16px;
  padding: 36px 36px 28px; min-height: 160px;
  text-align: left; cursor: pointer;
  display: flex; flex-direction: column; gap: 10px;
  font-family: inherit;
  transition: border-color .15s, box-shadow .15s, transform .12s;
}
.home-card--intro-hero:hover {
  border-color: #8a6520;
  box-shadow: 0 6px 28px rgba(92,74,30,.18);
  transform: translateY(-3px);
}
.home-card--intro-hero .home-card__glyph { font-size: 34px; color: #5c4a1e; }
.home-card--intro-hero .home-card__title { font-size: 28px; }
.home-card__start-tag {
  display: inline-block;
  background: #5c4a1e; color: #f5edd6;
  font-family: var(--mono); font-size: 10px; font-weight: 700;
  letter-spacing: 0.16em; padding: 4px 10px; border-radius: 4px;
  margin-bottom: 4px; align-self: flex-start;
}
.home-screen__section-head {
  padding: 14px 0 6px; border-top: 2px solid #d4b87a; margin-top: 4px;
}
.home-screen__section-title {
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-size: 22px; font-weight: 600; color: #29261b; margin: 0 0 4px;
}
.home-screen__section-sub {
  font-size: 13px; color: #7c6535; margin: 0; line-height: 1.55;
}
.home-screen__pair {
  display: grid; grid-template-columns: 1fr 1fr; gap: 18px;
}
.home-screen__pair--trio {
  grid-template-columns: repeat(3, 1fr);
}
@media (max-width: 760px){ .home-screen__pair--trio{ grid-template-columns: 1fr; } }
@media (max-width: 600px){ .home-screen__pair{ grid-template-columns: 1fr; } }

/* ── Big Picture View page ─────────────────────────────────────────── */
.bigpic-page { padding: 24px; max-width: 1200px; margin: 0 auto; }
.bigpic-selector {
  background: #fdf5e4; border: 2px solid #b5894a; border-radius: 14px;
  padding: 24px 28px; margin: 20px 0 30px;
}
.bigpic-selector__label {
  display: block; font-family: var(--sans); font-size: 16px; font-weight: 600;
  color: #29261b; margin-bottom: 12px; line-height: 1.45;
}
.bigpic-selector__select {
  display: block; width: 100%; padding: 12px 16px;
  font-family: var(--sans); font-size: 15px; color: #29261b;
  background: #fff8ec; border: 1.5px solid #b5894a; border-radius: 9px;
  cursor: pointer; margin-bottom: 12px; box-sizing: border-box;
}
.bigpic-selector__select:focus { outline: 2px solid #b5894a; }
.bigpic-selector__all {
  display: block; width: 100%; margin: 0 0 12px; padding: 13px 18px;
  font-family: var(--sans); font-size: 15px; font-weight: 700; letter-spacing: .02em;
  color: #f5efe1; background: #b5894a; border: 0; border-radius: 9px;
  cursor: pointer; box-shadow: 0 2px 8px rgba(181,137,74,.30);
  transition: background .15s, transform .12s;
}
.bigpic-selector__all:hover { background: #9c7438; transform: translateY(-1px); }
.bigpic-selector__all:active { transform: none; }
.bigpic-selector__hint { font-size: 12px; color: #7c6535; margin: 0; font-style: italic; }
.bigpic-placeholder {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  min-height: 280px; gap: 18px; color: #7c6535;
  border: 2px dashed #d4b87a; border-radius: 14px; margin: 20px 0;
  background: rgba(253,248,240,0.6);
}
.bigpic-placeholder__icon { font-size: 52px; opacity: 0.45; }
.bigpic-placeholder p { font-size: 16px; text-align: center; max-width: 420px; margin: 0; color: #5c4332; }

/* ── Thread View page ──────────────────────────────────────────────── */
.thread-view-page { padding: 20px; max-width: 1200px; margin: 0 auto; }
.thread-toggle-bar {
  display: flex; gap: 10px; flex-wrap: wrap;
  margin: 20px 0 28px; padding: 16px 18px;
  background: #fdf5e4; border-radius: 12px; border: 1px solid #d4b87a;
}
.thread-toggle-btn {
  padding: 10px 22px; border: 1.5px solid #d4b87a; border-radius: 8px;
  background: #fdf8f0; font-family: var(--sans); font-size: 14px; font-weight: 500;
  color: #5c4a1e; cursor: pointer; transition: all .15s; flex: 1; min-width: 140px;
}
.thread-toggle-btn:hover { border-color: var(--tab-color, #b5894a); background: #fef4e0; }
.thread-toggle-btn.is-active {
  background: var(--tab-color, #5c4a1e); border-color: var(--tab-color, #5c4a1e);
  color: #fff; font-weight: 600; box-shadow: 0 2px 10px rgba(92,74,30,.2);
}
.tension-view { }
.tension-view__lede { font-size: 15px; color: #5c4332; margin: 0 0 28px; line-height: 1.7; }
.tension-view__session { margin-bottom: 40px; }
.tension-view__session-head {
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-size: 21px; font-weight: 600; color: #29261b;
  padding-bottom: 10px; border-bottom: 1px solid #e0d0b0; margin-bottom: 18px;
}


/* ── Sub-theme reveal in Introduction ─────────────────────────────── */
.overview-subtheme-reveal {
  margin: 10px 0 4px; border: 1px solid rgba(181,137,74,0.35); border-radius: 10px;
  overflow: hidden; transition: border-color .15s;
}
.overview-subtheme-reveal.is-open { border-color: rgba(181,137,74,0.6); }
.overview-subtheme-reveal__head {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 14px; background: rgba(181,137,74,0.09);
  border: 0; cursor: pointer; text-align: left; width: 100%;
  font-family: var(--sans); font-size: 13px; font-weight: 600; color: #5c4a1e;
  transition: background .13s;
}
.overview-subtheme-reveal__head:hover { background: rgba(181,137,74,0.16); }
.overview-subtheme-reveal__arrow { font-size: 14px; color: #b5894a; flex: none; }
.overview-subtheme-reveal__body {
  padding: 14px 18px; font-size: 13.5px; color: #3a2e10; line-height: 1.7;
  border-top: 1px solid rgba(181,137,74,0.2);
}
.overview-subtheme-reveal__body p { margin: 0; }

/* ── Jump buttons (Introduction → Thread/Recap) ────────────────────── */
.intro-jump-btns {
  display: flex; gap: 16px; flex-wrap: wrap; padding: 32px 24px 40px;
  border-top: 1px solid #e0d0b0; margin: 0; justify-content: center;
}
.intro-jump-btn {
  display: flex; align-items: center; gap: 14px;
  padding: 18px 26px; background: #fdf5e4;
  border: 1.5px solid #b5894a; border-radius: 13px;
  cursor: pointer; font-family: var(--sans); font-size: 14px; color: #29261b;
  text-align: left; max-width: 380px; flex: 1; min-width: 220px;
  transition: border-color .15s, background .12s, transform .12s;
}
.intro-jump-btn:hover { border-color: #8a6520; background: #fef0cc; transform: translateY(-2px); }
.intro-jump-btn__icon { font-size: 26px; color: #b5894a; flex: none; line-height: 1; }
.intro-jump-btn strong { color: #5c4a1e; }

/* ── Recap session progress + reset bar ───────────────────────────── */
.rc-session__progress-bar {
  display: flex; align-items: center; gap: 12px;
  padding: 8px 20px; background: rgba(253,248,240,0.9);
  border-bottom: 1px solid #e8dcc8;
  justify-content: flex-end;
}
.rc-session__progress-label {
  font-size: 12px; color: #7c6535; font-family: var(--sans); margin-right: auto;
}
.rc-session__progress-bar .rc-btn--sm { font-size: 12px; padding: 5px 12px; }

/* ── At-a-Glance collapsible ──────────────────────────────────────── */
.rc-collapse--at-a-glance .rc-collapse__head {
  background: linear-gradient(135deg, #2e2208 0%, #1a1204 100%);
  color: #f5edd6; border-radius: 10px; padding: 18px 20px;
  flex-direction: column; align-items: center; justify-content: center;
  text-align: center; gap: 6px;
}
.rc-collapse--at-a-glance .rc-collapse__head:hover { opacity: 0.92; }
.rc-collapse--at-a-glance .rc-collapse__chev { display: none; }
.rc-collapse--at-a-glance .rc-collapse__label {
  display: flex; flex-direction: column; align-items: center; gap: 5px;
  width: 100%; color: #f5edd6;
  text-transform: none; letter-spacing: normal; font-weight: 600;
}
.rc-glance-label {
  display: flex; flex-direction: column; align-items: center; gap: 5px;
  width: 100%; text-align: center;
}
.rc-glance-label__l1, .rc-glance-label__l2, .rc-glance-label__l3 { display: block; }
.rc-glance-label__l1 {
  font-family: var(--mono); font-size: 11px; font-weight: 700;
  letter-spacing: 0.18em; text-transform: uppercase; color: #d4b87a;
}
.rc-glance-label__l2 {
  font-family: var(--serif); font-size: 17px; font-weight: 600;
  letter-spacing: 0.01em; color: #f7efd9; line-height: 1.2;
}
.rc-glance-label__l3 {
  font-family: var(--serif); font-style: italic; font-size: 13px;
  font-weight: 500; color: #c9b489;
}
.rc-collapse--at-a-glance .rc-collapse__hint { display: none; }
.rc-collapse--at-a-glance.is-open .rc-collapse__head { border-radius: 10px 10px 0 0; }
.rc-collapse--at-a-glance .rc-collapse__body { padding: 0; border: 1.5px solid #5c4a1e; border-top: 0; border-radius: 0 0 10px 10px; overflow: hidden; }


/* ==============================================
   v3 — intro-nav-section
============================================== */
.intro-nav-section {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1.5rem;
  margin: 2.5rem auto;
  max-width: 780px;
  padding: 0 1.25rem;
}
@media (max-width: 600px) {
  .intro-nav-section { grid-template-columns: 1fr; }
}
.intro-nav-block {
  background: var(--c-surface, #1c1c1f);
  border: 1px solid var(--c-border, rgba(255,255,255,.1));
  border-radius: 14px;
  padding: 1.5rem 1.25rem;
  display: flex;
  flex-direction: column;
  gap: 0.55rem;
}
.intro-nav-block__heading {
  font-size: 1.1rem;
  font-weight: 700;
  color: var(--c-text, #f0ece4);
  margin: 0 0 .15rem;
}
.intro-nav-block__sub {
  font-size: .82rem;
  color: var(--c-muted, #888);
  margin: 0;
  font-style: italic;
}
.intro-nav-block__desc {
  font-size: .88rem;
  color: var(--c-text-soft, #c8c4bc);
  margin: 0;
  line-height: 1.5;
}
.intro-nav-btn {
  display: inline-block;
  margin-top: .4rem;
  padding: .6rem 1.1rem;
  background: var(--c-gold, #b5894a);
  color: #fff;
  border: none;
  border-radius: 8px;
  font-size: .88rem;
  font-weight: 600;
  cursor: pointer;
  transition: opacity .18s, transform .12s;
  text-align: left;
}
.intro-nav-btn:hover { opacity: .88; transform: translateY(-1px); }
.intro-nav-btn--secondary {
  background: var(--c-surface2, #28282d);
  color: var(--c-text, #f0ece4);
  border: 1px solid var(--c-border, rgba(255,255,255,.15));
}
.intro-nav-btn--secondary:hover { background: rgba(255,255,255,.08); }

/* ==============================================
   v3 — BigPictureAndThreadPage
============================================== */
.bigpic-and-thread-page { display: flex; flex-direction: column; }
.combined-section--thread {
  border-top: 2px solid var(--c-border, rgba(255,255,255,.1));
  margin-top: 2rem;
  padding-top: 1rem;
}
.combined-recap-cta {
  max-width: 780px;
  margin: 2rem auto;
  padding: 1.25rem 1.5rem;
  background: var(--c-surface, #1c1c1f);
  border: 1px solid var(--c-border, rgba(255,255,255,.1));
  border-radius: 12px;
  display: flex;
  align-items: center;
  gap: 1.25rem;
  flex-wrap: wrap;
}
.combined-recap-cta__text {
  flex: 1;
  margin: 0;
  font-size: .9rem;
  color: var(--c-muted, #888);
}

/* ==============================================
   v3 — Pray For box
============================================== */
.rc-prayfor {
  margin: 1rem 1.25rem .5rem;
  padding: 1rem 1.25rem;
  background: linear-gradient(135deg, rgba(62,103,146,.18) 0%, rgba(62,103,146,.08) 100%);
  border: 1px solid rgba(62,103,146,.35);
  border-left: 4px solid var(--c-nt, #3e6792);

  display: flex;
  flex-direction: column;
  gap: .55rem;
}
.rc-prayfor__label {
  font-size: .78rem;
  font-weight: 700;
  letter-spacing: .07em;
  text-transform: uppercase;
  color: var(--c-nt, #3e6792);
  display: flex;
  align-items: center;
  gap: .4rem;
}
.rc-prayfor__icon { font-size: 1rem; }
.rc-prayfor__text {
  margin: 0;
  font-size: .95rem;
  color: var(--c-text, #f0ece4);
  line-height: 1.6;
  font-style: italic;
}

/* ==============================================
   v3 — Previous session Main Point
============================================== */
.rc-collapse--prev-mp {
  margin: .75rem 1.25rem;
}
.rc-collapse--prev-mp .rc-collapse__head {
  background: var(--c-surface2, #28282d);
  border: 1px solid var(--c-border, rgba(255,255,255,.1));
  border-radius: 8px;
}
.rc-prevmp {
  padding: .75rem 0;
  display: flex;
  flex-direction: column;
  gap: .4rem;
}
.rc-prevmp__session-label {
  font-size: .75rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .06em;
  color: var(--c-muted, #888);
}
.rc-prevmp__text {
  margin: 0;
  font-size: 1rem;
  font-style: italic;
  color: var(--c-text, #f0ece4);
  line-height: 1.6;
  border-left: 3px solid var(--c-gold, #b5894a);
  padding-left: .75rem;
}

/* ==============================================
   v3 — Division questions inner collapsible
============================================== */
.rc-collapse--div-questions {
  margin-top: .75rem;
  border: 1px solid var(--c-border, rgba(255,255,255,.1));
  border-radius: 8px;
  overflow: hidden;
}
.rc-collapse--div-questions .rc-collapse__head {
  background: rgba(255,255,255,.04);
  font-size: .85rem;
  font-weight: 600;
}
.rc-collapse--div-questions .rc-collapse__body { padding: 0; }


/* ==============================================
   v4 — intro-nav-section vertical layout
============================================== */
.intro-nav-section--vertical {
  grid-template-columns: 1fr;
  max-width: 560px;
}
.intro-nav-section--vertical .intro-nav-block {
  flex-direction: row;
  flex-wrap: wrap;
  align-items: flex-start;
  gap: 0.75rem;
}
.intro-nav-section--vertical .intro-nav-block__heading {
  width: 100%;
}
.intro-nav-section--vertical .intro-nav-block__sub {
  width: 100%;
}
.intro-nav-section--vertical .intro-nav-block__desc {
  flex: 1 1 200px;
}
.intro-nav-section--vertical .intro-nav-btn {
  flex: 0 0 auto;
  align-self: flex-end;
}

/* ==============================================
   v4 — Fix prev-mp color contrast
============================================== */
.rc-collapse--prev-mp .rc-collapse__label {
  color: var(--c-text, #f0ece4) !important;
}
.rc-collapse--prev-mp .rc-collapse__head {
  color: var(--c-text, #f0ece4);
}
.rc-prevmp__session-label {
  color: #b0a898 !important;
}
.rc-prevmp__text {
  color: #f0ece4 !important;
}

/* ==============================================

.scol__topic{
  font-family: var(--serif);
  font-style: italic;
  font-size: 12.5px;
  color: var(--ink-3);
  margin-top: 1px;
  line-height: 1.2;
  white-space: normal;
  overflow: visible;
}

/* track row label */
.subway__labels{
  display: grid;
  grid-template-rows: repeat(6, 1fr);
  gap: 0;
  align-items: stretch;
}
.tlabel{
  display:flex; align-items:center; gap:8px;
  padding-right: 6px;
  height: 56px;
  cursor: pointer;
  border-radius: 8px 0 0 8px;
  padding-left: 6px;
  transition: background 160ms ease;
}
.tlabel:hover{ background: var(--bg-card-2); }
.tlabel.is-active{
  background: var(--bg-warm);
}
.tlabel.is-dim{ opacity: 0.3; }
.tlabel__glyph{
  font-family: var(--serif);
  font-size: 18px;
  color: var(--theme-color);
  width: 22px; text-align:center;
}
.tlabel__name{
  font-family: var(--sans);
  font-weight: 600;
  font-size: 12px;
  color: var(--ink-2);
  letter-spacing: 0.01em;
}

.subway__tracks{
  position: relative;
  display: grid;
  grid-template-rows: repeat(6, 1fr);
  grid-template-columns: repeat(var(--sess-cols, 11), minmax(0, 1fr));
  gap: 0;
  height: 336px; /* 6 * 56 */
  border-left: 1px dashed var(--rule);
}
/* Vertical column dividers (light) */
.subway__tracks::before{
  content:'';
  position:absolute; inset:0;
  background-image: repeating-linear-gradient(
    to right,
    transparent 0,
    transparent calc((100% / var(--sess-cols, 11)) - 1px),
    oklch(0.85 0.02 70 / 0.5) calc((100% / var(--sess-cols, 11)) - 1px),
    oklch(0.85 0.02 70 / 0.5) calc(100% / var(--sess-cols, 11))
  );
  pointer-events:none;
}
/* Hairline horizontal divider every track row */
.subway__tracks::after{
  content:'';
  position:absolute; inset:0;
  background-image: repeating-linear-gradient(
    to bottom,
    transparent 0,
    transparent calc((100% / 6) - 1px),
    oklch(0.85 0.02 70 / 0.35) calc((100% / 6) - 1px),
    oklch(0.85 0.02 70 / 0.35) calc(100% / 6)
  );
  pointer-events:none;
}

/* Track line (the colored rail) - rendered with SVG */
.subway__svg{
  position:absolute; inset:0;
  width: 100%; height: 100%;
  pointer-events: none;
}

/* Stations (interactive cells) */
.station{
  position: relative;
  display:flex; align-items:center; justify-content:center;
  cursor: pointer;
  z-index: 2;
}
.station__dot{
  width: 18px; height: 18px; border-radius: 50%;
  background: var(--bg-card);
  border: 3px solid var(--station-color);
  transition: transform 180ms ease, box-shadow 220ms ease;
  position: relative;
}
.station.is-primary .station__dot{
  width: 26px; height: 26px;
  border-width: 4px;
  background: var(--station-color);
  box-shadow: 0 0 0 4px var(--bg-card), 0 0 0 5px var(--station-color);
}
.station.is-empty .station__dot{
  width: 6px; height: 6px;
  background: var(--rule);
  border: 0;
  opacity: 0.6;
}
.station:hover .station__dot{
  transform: scale(1.15);
}
.station.is-selected .station__dot{
  transform: scale(1.2);
  box-shadow: 0 0 0 4px var(--bg-card), 0 0 0 5px var(--station-color), 0 0 0 9px oklch(0.95 0.05 70);
}
.station.is-dim .station__dot{
  opacity: 0.18;
}
.station.is-thread-on .station__dot{
  box-shadow: 0 0 0 3px var(--bg-card), 0 0 0 4px var(--station-color);
}
.station__tip{
  position: absolute;
  bottom: calc(100% + 8px);
  left: 50%;
  transform: translateX(-50%);
  background: var(--ink);
  color: #f5efe1;
  padding: 8px 11px;
  border-radius: 6px;
  font-family: var(--sans);
  font-size: 12px;
  line-height: 1.4;
  width: 220px;
  text-align: left;
  opacity: 0;
  pointer-events: none;
  transition: opacity 160ms ease;
  z-index: 5;
  box-shadow: 0 8px 32px -8px rgba(0,0,0,0.4);
}
.station__tip::after{
  content:'';
  position:absolute; left:50%; top:100%;
  width:0;height:0;
  border:5px solid transparent;
  border-top-color: var(--ink);
  transform: translateX(-50%);
}
.station:hover .station__tip{ opacity: 1; }
.station__tip b{
  font-weight: 600;
  display:block;
  font-family: var(--serif);
  font-size: 12.5px;
  font-style: italic;
  margin-bottom: 3px;
  color: var(--station-color-light, #f5efe1);
}

/* Main-point ribbon below subway */
.mp-ribbon{
  display:grid;
  grid-template-columns: 190px 1fr;
  gap: 8px;
  margin-top: 12px;
  align-items: stretch;
}
.mp-ribbon__label{
  display:flex; align-items:center; gap:8px;
  font-family: var(--sans);
  text-transform: uppercase;
  letter-spacing: 0.18em;
  font-size: 12px;
  color: var(--ink-3);
  padding-left: 6px;
  font-weight: 600;
}
.mp-ribbon__row{
  display:grid;
  grid-template-columns: repeat(var(--sess-cols, 11), minmax(0, 1fr));
  gap: 0;
}
.mp-cell{
  padding: 10px 10px;
  font-family: var(--serif);
  font-style: italic;
  font-size: 12.5px;
  line-height: 1.35;
  color: var(--ink-2);
  border-left: 1px dashed var(--rule);
  cursor: pointer;
  border-radius: 0 0 6px 6px;
  transition: background 160ms ease;
  white-space: normal;
  word-break: break-word;
  text-wrap: pretty;
}
.mp-cell:first-child{ border-left: 0; }
.mp-cell:hover{ background: var(--bg-card-2); }
.mp-cell.is-selected{ background: var(--bg-warm); color: var(--ink); }

/* ============ Detail panel ============ */
.detail{
  margin-top: 36px;
  display:grid;
  grid-template-columns: 1fr;
  gap: 18px;
}

/* Hero banner with painted background (sessions w/ image) */
.detail__hero{
  position: relative;
  height: 380px;
  border-radius: 14px;
  overflow: hidden;
  background-size: cover;
  background-position: center 30%;
  box-shadow: var(--shadow-deep);
  margin-bottom: 8px;
  border: 1px solid var(--rule-2);
  isolation: isolate;
}
.detail__hero::before{
  content:'';
  position: absolute; inset: 0;
  background:
    linear-gradient(to top,
      rgba(15,10,4,0.92) 0%,
      rgba(15,10,4,0.55) 38%,
      rgba(15,10,4,0.15) 65%,
      rgba(15,10,4,0.05) 100%),
    linear-gradient(to right,
      rgba(15,10,4,0.35) 0%,
      transparent 45%);
  z-index: 1;
}
.detail__hero-content{
  position: absolute;
  left: 36px; right: 36px; bottom: 32px;
  display: grid;
  grid-template-columns: 1fr minmax(0, 42%);
  gap: 36px;
  align-items: end;
  z-index: 2;
  color: #f5efe1;
}
.detail__hero-num{
  font-family: var(--mono);
  font-size: 12px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  opacity: 0.85;
  margin-bottom: 12px;
}
.detail__hero-title{
  font-family: var(--serif);
  font-size: 56px;
  line-height: 0.98;
  letter-spacing: -0.012em;
  font-weight: 500;
  margin: 0;
  text-shadow: 0 2px 24px rgba(0,0,0,0.6);
  max-width: 14ch;
}
.detail__hero-topic{
  font-family: var(--serif);
  font-style: italic;
  font-size: 26px;
  margin-top: 8px;
  opacity: 0.95;
  text-shadow: 0 2px 12px rgba(0,0,0,0.7);
  max-width: 22ch;
}
.detail__hero-mp{
  font-family: var(--serif);
  font-style: italic;
  font-size: 18px;
  line-height: 1.4;
  opacity: 0.95;
  border-left: 2px solid oklch(0.85 0.12 75);
  padding-left: 16px;
  color: #f5efe1;
  text-shadow: 0 2px 12px rgba(0,0,0,0.75);
}
.detail__hero-nav{
  position: absolute;
  top: 18px; right: 18px;
  display:flex; gap: 6px;
  z-index: 3;
}
.detail__hero-nav .navbtn{
  background: rgba(245,239,225,0.12);
  border: 1px solid rgba(245,239,225,0.25);
  color: rgba(245,239,225,0.95);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
}
.detail__hero-nav .navbtn:hover{
  background: rgba(245,239,225,0.22);
  color: #fff;
}
.detail__head{
  display:grid;
  grid-template-columns: minmax(260px, 380px) 1fr auto;
  gap: 24px;
  align-items: end;
  border-bottom: 1px solid var(--rule);
  padding-bottom: 14px;
}
.detail__head--nomp{
  grid-template-columns: 1fr auto;
}
.detail__num{
  font-family: var(--mono);
  font-size: 12px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--ink-3);
  margin-bottom: 8px;
}
.detail__title{
  font-family: var(--serif);
  font-size: 44px;
  line-height: 1.0;
  font-weight: 500;
  margin: 0;
  color: var(--ink);
  letter-spacing: -0.01em;
}
.detail__topic{
  font-family: var(--serif);
  font-style: italic;
  font-size: 22px;
  color: var(--ink-2);
  margin-top: 4px;
}
.detail__mp{
  font-family: var(--serif);
  font-size: 19px;
  font-style: italic;
  line-height: 1.35;
  color: var(--ink);
  max-width: 56ch;
  border-left: 2px solid var(--c-intention);
  padding-left: 16px;
}
.detail__nav{
  display:flex; gap: 6px;
  align-items:center;
}
.navbtn{
  appearance:none;
  border: 1px solid var(--rule);
  background: var(--bg-card);
  color: var(--ink-2);
  font-family: var(--mono);
  font-size: 12px;
  letter-spacing: 0.06em;
  padding: 8px 10px;
  border-radius: 8px;
  cursor: pointer;
  transition: background 160ms ease, color 160ms ease;
}
.navbtn:hover{ background: var(--bg-warm); color: var(--ink); }
.navbtn[disabled]{ opacity:0.4; cursor: not-allowed; }

/* Theme cards grid */
.theme-grid{
  display:grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
}
.tcard{
  border: 1px solid var(--rule);
  background: var(--bg-card);
  border-radius: 12px;
  padding: 16px 16px 18px;
  position: relative;
  overflow: hidden;
  transition: transform 220ms ease, box-shadow 220ms ease, border-color 220ms ease;
  display:flex; flex-direction:column;
}
.tcard::before{
  content:'';
  position:absolute; left:0; top:0; bottom:0;
  width: 4px;
  background: var(--theme-color);
}
.tcard.is-primary{
  background: linear-gradient(180deg, var(--theme-soft), var(--bg-card) 70%);
  box-shadow: var(--shadow-soft);
  border-color: var(--theme-color);
}
.tcard.is-empty{ opacity: 0.5; }
.tcard__head{
  display:flex; align-items:center; gap:8px;
  margin-bottom: 10px;
}
.tcard__glyph{
  font-family: var(--serif);
  font-size: 16px;
  color: var(--theme-color);
}
.tcard__tag{
  font-family: var(--sans);
  text-transform: uppercase;
  letter-spacing: 0.14em;
  font-weight: 700;
  font-size: 12px;
  color: var(--theme-color);
}
.tcard__title{
  font-family: var(--serif);
  font-style: italic;
  font-size: 14px;
  color: var(--ink-3);
  margin-left: auto;
}
.tcard__body{
  font-family: var(--sans);
  font-size: 13.5px;
  line-height: 1.55;
  color: var(--ink);
  text-wrap: pretty;
}
.tcard__body.is-mono{
  font-family: var(--mono);
  font-size: 12px;
  line-height: 1.5;
  color: var(--ink-2);
}
.tcard__body p{ margin: 0 0 8px; }
.tcard__body p:last-child{ margin-bottom: 0; }

.tcard__empty{
  font-family: var(--serif);
  font-style: italic;
  font-size: 13px;
  color: var(--muted);
}
.tcard--nt{ grid-column: span 1; }
.tcard__ntref{
  font-family: var(--mono);
  font-size: 12px;
  color: var(--c-nt);
  font-weight: 600;
  letter-spacing: 0.02em;
  margin-bottom: 8px;
  display:inline-block;
  padding: 3px 8px;
  border: 1px solid var(--c-nt);
  border-radius: 99px;
  background: var(--c-nt-soft);
}

/* Big "story so far" panel when nothing selected */
.welcome{
  margin-top: 36px;
  padding: 28px 32px 32px;
  border: 1px solid var(--rule);
  border-radius: 14px;
  background:
    linear-gradient(180deg, rgba(251,247,236,0.92) 0%, rgba(247,241,222,0.96) 100%),
    url("assets/img/ot-overview.webp");
  background-size: cover;
  background-position: center;
  background-blend-mode: normal;
  position: relative;
  overflow: hidden;
}
.welcome::before{
  content:'';
  position: absolute;
  inset: 0;
  background:
    radial-gradient(circle at 88% 25%, rgba(251,247,236,0.0) 0%, rgba(251,247,236,0.5) 60%, rgba(251,247,236,0.95) 100%);
  pointer-events: none;
}
.welcome > *{ position: relative; z-index: 1; }
.welcome h3{
  font-family: var(--serif);
  font-style: italic;
  font-size: 26px;
  margin: 0 0 8px;
  color: var(--ink);
  font-weight: 500;
}
.welcome p{
  font-family: var(--serif);
  font-size: 17px;
  line-height: 1.5;
  color: var(--ink-2);
  max-width: 70ch;
  margin: 0 0 14px;
}
.welcome__hints{
  display:flex; gap: 18px; flex-wrap:wrap;
  margin-top: 18px;
  padding-top: 18px;
  border-top: 1px solid var(--rule);
}
.welcome__hint{
  display:flex; align-items:center; gap:10px;
  font-family: var(--sans);
  font-size: 12px;
  color: var(--ink-3);
}
.welcome__hint .h-glyph{
  width: 28px; height: 28px; border-radius: 8px;
  background: var(--bg-warm);
  display:inline-flex; align-items:center; justify-content:center;
  font-family: var(--serif);
  font-size: 16px;
  border: 1px solid var(--rule);
}

/* ============ Thread story panel ============ */
.thread{
  margin-top: 36px;
}
.thread__head{
  display:flex; align-items:end; gap: 16px;
  border-bottom: 1px solid var(--rule);
  padding-bottom: 14px;
  margin-bottom: 22px;
}
.thread__tag{
  font-family: var(--sans);
  text-transform: uppercase;
  letter-spacing: 0.22em;
  font-size: 12px;
  font-weight: 700;
  color: var(--theme-color);
  background: var(--theme-soft);
  padding: 4px 10px;
  border-radius: 99px;
  border: 1px solid var(--theme-color);
}
.thread__title{
  font-family: var(--serif);
  font-size: 38px;
  line-height: 1.0;
  margin: 0;
  font-weight: 500;
  color: var(--ink);
  letter-spacing: -0.005em;
}
.thread__title em{ font-style: italic; color: var(--theme-color); }
.thread__blurb{
  font-family: var(--serif);
  font-style: italic;
  font-size: 17px;
  color: var(--ink-2);
  max-width: 50ch;
  margin: 0 0 0 auto;
}
.thread__stops{
  display:grid;
  grid-template-columns: 1fr;
  gap: 0;
  position: relative;
}
.tstop{
  display:grid;
  grid-template-columns: 110px 64px 1fr;
  gap: 20px;
  padding: 18px 0 22px;
  border-top: 1px dashed var(--rule);
  position: relative;
  cursor: pointer;
  transition: background 160ms ease;
}
.tstop__thumb{
  width: 64px; height: 64px;
  border-radius: 8px;
  background-size: cover;
  background-position: center;
  border: 1px solid var(--rule);
  margin-top: 2px;
  box-shadow: 0 2px 8px rgba(40,30,10,0.18);
}
.tstop__thumb.is-placeholder{
  background: linear-gradient(135deg, var(--bg-warm), var(--rule));
  display:flex; align-items:center; justify-content:center;
  font-family: var(--serif);
  font-style: italic;
  font-size: 22px;
  color: var(--muted);
}
.tstop:hover{ background: oklch(0.97 0.03 70 / 0.45); }
.tstop:first-child{ border-top: 0; }
.tstop__num{
  font-family: var(--mono);
  font-size: 12px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--ink-3);
  padding-top: 4px;
}
.tstop__num b{
  display:block;
  font-family: var(--serif);
  font-style: italic;
  font-size: 22px;
  color: var(--ink);
  font-weight: 500;
  letter-spacing: -0.005em;
  margin-top: 4px;
}
.tstop__body{
  font-family: var(--sans);
  font-size: 14.5px;
  line-height: 1.55;
  color: var(--ink);
  position: relative;
  text-wrap: pretty;
}
.thread__stops::before{ display: none; }
.tstop__body::before{ display: none; }
.tstop__topic{
  font-family: var(--serif);
  font-style: italic;
  font-size: 15px;
  color: var(--ink-3);
  margin-bottom: 6px;
}
.tstop.is-empty .tstop__body{
  color: var(--muted);
  font-style: italic;
  font-family: var(--serif);
}
.tstop.is-empty .tstop__body::before{
  background: var(--rule);
  border-color: var(--rule);
  width: 8px; height: 8px;
  left: 7px; top: 10px;
}

/* ============ Matrix view ============ */
.matrix-page { max-width: 1320px; }
.matrix-legend__star { font-size: 22px; color: #b5894a; line-height: 1; flex: none; }
.matrix{
  margin-top: 24px;
  border: 1px solid var(--rule);
  border-radius: 14px;
  background: var(--bg-card);
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  box-shadow: var(--shadow-soft);
}
.matrix__inner{
  display: grid;
  grid-template-columns: var(--mcol-label, 138px) repeat(var(--sess-cols, 11), var(--mcol-w, 180px));
  min-width: max-content;
}
/* Frozen first column */
.mlabel, .mhead--corner{
  position: sticky; left: 0; z-index: 2;
  box-shadow: 6px 0 8px -6px rgba(60,40,10,0.25);
}
.mhead--corner{ z-index: 3; border-right: 1px solid var(--rule); }
/* Box-size slider */
.matrix-sizer{
  display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
  margin: 18px 0 4px; padding: 10px 14px;
  background: #fdf5e4; border: 1px solid #d4b87a; border-radius: 10px;
  font-family: var(--sans); font-size: 12px; color: #7c6535;
}
.matrix-sizer__label{ font-weight: 700; color: #5c4a1e; letter-spacing: 0.04em; text-transform: uppercase; font-size: 11px; }
.matrix-sizer__end{ font-size: 11px; color: #8a6520; }
.matrix-sizer__range{ flex: 1; min-width: 140px; max-width: 320px; accent-color: #a4423a; cursor: pointer; }
.matrix-sizer__hint{ font-style: italic; color: #9a7a45; margin-left: auto; }
.mhead{
  font-family: var(--sans);
  text-transform: uppercase;
  letter-spacing: 0.14em;
  font-weight: 600;
  font-size: 12px;
  color: var(--ink-3);
  padding: 10px 12px;
  border-bottom: 1px solid var(--rule);
  background: var(--bg-card-2);
}
.mhead.session{
  cursor:default;
}
.mhead.session b{
  display:block;
  font-family: var(--serif);
  font-style: normal;
  font-weight: 500;
  font-size: 13px;
  color: var(--ink);
  letter-spacing: -0.003em;
  text-transform: none;
  margin-top: 2px;
}
.mlabel{
  display:flex; align-items:center; gap: 7px;
  padding: 8px 10px;
  border-bottom: 1px solid var(--rule);
  border-right: 1px solid var(--rule);
  background: var(--bg-card-2);
  font-family: var(--sans);
  font-weight: 600;
  font-size: 11.5px;
  color: var(--ink-2);
  cursor: pointer;
}
.mlabel__glyph{
  font-family: var(--serif);
  color: var(--theme-color);
  font-size: 14px;
}
.mcell{
  padding: 8px 10px;
  border-bottom: 1px solid var(--rule);
  border-right: 1px solid var(--rule);
  font-family: var(--sans);
  font-size: 11.5px;
  line-height: 1.4;
  color: var(--ink-2);
  background: var(--bg-card);
  position: relative;
  cursor: pointer;
  min-height: 62px;
}
.mcell:hover{ background: var(--bg-card-2); }
.mcell.is-primary{
  background: var(--theme-soft);
}
.mcell.is-empty{ background: oklch(0.96 0.01 70); color: var(--muted); font-style: italic; cursor: default; }
.mcell__ntref{ font-family: var(--mono); font-size: 10px; color: var(--c-nt); font-weight: 600; margin-bottom: 4px; }
.mcell.is-primary::before{
  content:'★';
  position: absolute;
  top: 4px; right: 6px;
  color: var(--theme-color);
  font-size: 12px;
}

/* ============ Reading view ============ */
.reading{
  margin-top: 24px;
  display:flex; flex-direction:column; gap: 0;
}
.rsess{
  display:grid;
  grid-template-columns: 220px 1fr;
  gap: 36px;
  padding: 32px 0;
  border-top: 1px solid var(--rule);
}
.rsess:first-child{ border-top: 0; padding-top: 18px; }
.rsess__side{
  position: sticky;
  top: 20px;
  height: max-content;
}
.rsess__num{
  font-family: var(--mono);
  font-size: 12px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--ink-3);
  margin-bottom: 6px;
}
.rsess__passage{
  font-family: var(--serif);
  font-size: 32px;
  line-height: 1.0;
  font-weight: 500;
  margin: 0 0 4px;
  letter-spacing: -0.005em;
}
.rsess__topic{
  font-family: var(--serif);
  font-style: italic;
  font-size: 18px;
  color: var(--ink-2);
  margin-bottom: 14px;
}
.rsess__mp{
  font-family: var(--serif);
  font-style: italic;
  font-size: 15px;
  line-height: 1.45;
  color: var(--ink-2);
  border-left: 2px solid var(--c-intention);
  padding-left: 12px;
}
.rsess__themes{
  display:grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
}

/* ============ View toggle (segmented) ============ */
.viewseg{
  display:flex;
  gap: 0;
  border: 1px solid var(--rule);
  border-radius: 99px;
  background: var(--bg-card);
  padding: 3px;
  align-items: center;
}
.viewseg button{
  appearance: none; border: 0; background: transparent;
  font-family: var(--sans);
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.04em;
  color: var(--ink-3);
  padding: 7px 14px;
  border-radius: 99px;
  cursor: pointer;
  transition: background 160ms ease, color 160ms ease;
}
.viewseg button.is-on{
  background: var(--ink);
  color: #f5efe1;
}
.viewseg button:hover:not(.is-on){ color: var(--ink); }

.toolbar{
  display:flex;
  align-items:center;
  gap: 18px;
  margin: 6px 0 16px;
  flex-wrap: wrap;
}
.toolbar__label{
  font-family: var(--sans);
  text-transform: uppercase;
  letter-spacing: 0.16em;
  font-size: 12px;
  color: var(--ink-3);
  font-weight: 600;
}
.toolbar__hint{
  font-family: var(--serif);
  font-style: italic;
  font-size: 14px;
  color: var(--ink-3);
  margin-left: auto;
}

/* dimmed state for filtering */
.dimmable.is-dim{ opacity: 0.22; transition: opacity 200ms ease; }

/* footer */
.footer{
  margin-top: 60px;
  padding-top: 20px;
  border-top: 1px solid var(--rule);
  display:flex; justify-content:space-between; align-items:center;
  font-family: var(--mono);
  font-size: 12px;
  letter-spacing: 0.1em;
  color: var(--ink-3);
  text-transform: uppercase;
}

/* ============ Sub-theme block (inside a ThreadStory) ============ */
.subtheme{
  margin: 12px 0 20px;
  padding: 20px 22px 22px;
  border: 1px dashed var(--theme-color);
  border-radius: 14px;
  background:
    linear-gradient(180deg, var(--theme-soft), var(--bg-card) 80%);
  position: relative;
  display: flex; flex-direction: column;
  gap: 16px;
}
.subtheme__head{
  display:flex; flex-direction:column; gap: 6px;
}
.subtheme__eyebrow{
  display:flex; align-items:center; gap: 8px;
  font-family: var(--mono);
  font-size: 12px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--theme-color);
  font-weight: 700;
}
.subtheme__hook{
  display: inline-block;
  font-family: var(--serif);
  font-style: normal;
  font-size: 14px;
  line-height: 1;
}
.subtheme__title{
  font-family: var(--serif);
  font-style: italic;
  font-size: 28px;

  color: var(--ink);

}
.subtheme__blurb{

}
.subfig__num{

  color: var(--theme-color);

}
.subfig__name{
  font-family: var(--serif);
  font-style: italic;
  font-size: 19px;
  font-weight: 500;
  color: var(--ink);
  letter-spacing: -0.005em;
}
.subfig__sess{
  margin-left: auto;
  font-family: var(--mono);
  font-size: 12px;
  letter-spacing: 0.12em;
  color: var(--ink-3);
  text-transform: uppercase;
  font-weight: 600;
}
.subfig__role{
  font-family: var(--mono);
  font-size: 12px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--theme-color);
  font-weight: 700;
}
.subfig__note{
  font-family: var(--sans);
  font-size: 13px;
  line-height: 1.45;
  color: var(--ink-2);
  text-wrap: pretty;
}

.subtheme__resolution{
  display:grid;
  grid-template-columns: auto 1fr;
  align-items: start;
  gap: 14px;
  padding: 14px 16px 14px;

    linear-gradient(180deg, var(--c-nt-soft), var(--bg-card) 90%);
}
.subtheme__resolution-arrow{
  font-family: var(--serif);
  font-size: 22px;
  color: var(--c-nt);
  line-height: 1;
  padding-top: 4px;
}
.subtheme__resolution-body{
  display:flex; flex-direction:column; gap: 4px;
}
.subtheme__resolution-label{
  font-family: var(--mono);
  font-size: 12px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--c-nt);
  font-weight: 700;
}
.subtheme__resolution-text{
  font-family: var(--serif);
  font-size: 15px;
  font-style: italic;
  line-height: 1.45;
  color: var(--ink);
  margin: 0;
  text-wrap: pretty;
}

@media (max-width: 1100px){
  .subtheme__figures{ grid-template-columns: 1fr 1fr; }
}
@media (max-width: 760px){
  .subtheme__figures{ grid-template-columns: 1fr; }
}

/* ============ Christ Anchor — the lens for every session ============ */
.christ-anchor{
  position: relative;
  margin: 4px 0 18px;
  padding: 0;
  border: 1px solid var(--c-nt);
  border-radius: 14px;
  overflow: hidden;
  background:
    radial-gradient(900px 360px at 88% -10%, var(--c-nt-soft), transparent 60%),
    linear-gradient(180deg, rgba(251,247,236,0.95), rgba(247,241,222,0.9)),
    var(--bg-card);
  box-shadow: var(--shadow-deep);
  display:flex;
  align-items: stretch;
  isolation: isolate;
}
.christ-anchor::before{
  content:'';
  position: absolute;
  inset: 0;
  background-image:
    radial-gradient(circle at 1px 1px, oklch(0.50 0.10 160 / 0.10) 1px, transparent 1.4px);
  background-size: 14px 14px;
  background-position: top left;
  pointer-events: none;
  opacity: 0.55;
  z-index: 0;
  mask: linear-gradient(90deg, rgba(0,0,0,0.18), transparent 60%);
  -webkit-mask: linear-gradient(90deg, rgba(0,0,0,0.18), transparent 60%);
}
.christ-anchor__rail{
  width: 6px;
  background: linear-gradient(180deg, var(--c-nt), oklch(0.55 0.13 160));
  flex: 0 0 6px;
}
.christ-anchor__inner{
  position: relative;
  z-index: 1;
  padding: 22px 28px 24px;
  display:grid;
  grid-template-columns: minmax(0, 1.05fr) minmax(0, 1fr);
  gap: 28px;
  align-items: center;
  flex: 1;
}
.christ-anchor__eyebrow{
  grid-column: 1 / -1;
  display:flex; align-items:center; gap: 10px;
  font-family: var(--mono);
  font-size: 12px;
  letter-spacing: 0.24em;
  text-transform: uppercase;
  color: var(--c-nt);
  font-weight: 700;
}
.christ-anchor__glyph{
  font-family: var(--serif);
  font-size: 16px;
  color: var(--c-nt);
  line-height: 1;
}
.christ-anchor__q{
  font-family: var(--serif);
  font-size: 44px;
  line-height: 1.02;
  font-weight: 500;
  margin: 0;
  letter-spacing: -0.015em;
  color: var(--ink);
  text-wrap: balance;
}
.christ-anchor__q em{
  font-style: italic;
  color: var(--c-nt);
  white-space: nowrap;
}
.christ-anchor__quote{
  font-family: var(--serif);
  font-style: italic;
  font-size: 18px;
  line-height: 1.45;
  color: var(--ink-2);
  margin: 0;
  padding: 14px 18px 14px 22px;
  position: relative;
  border-left: 2px solid var(--c-nt);
  background: linear-gradient(90deg, var(--c-nt-soft), transparent);
  border-radius: 0 8px 8px 0;
  text-wrap: pretty;
}
.christ-anchor__quote-mark{
  font-family: var(--serif);
  font-size: 56px;
  line-height: 0.5;
  color: var(--c-nt);
  position: absolute;
  left: 8px; top: 14px;
  opacity: 0.35;
  pointer-events: none;
}
.christ-anchor__quote cite{
  display:block;
  margin-top: 8px;
  font-style: normal;
  font-family: var(--mono);
  font-size: 12px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--c-nt);
  font-weight: 600;
}
.christ-anchor__note{
  grid-column: 1 / -1;
  font-family: var(--sans);
  font-size: 13px;
  line-height: 1.5;
  color: var(--ink-3);
  margin: 0;
  padding-top: 8px;
  border-top: 1px dashed var(--rule);
}
.christ-anchor__nt-pill{
  display:inline-flex; align-items:center; gap: 5px;
  padding: 2px 9px;
  border: 1px solid var(--c-nt);
  background: var(--c-nt-soft);
  color: var(--c-nt);
  font-family: var(--mono);
  font-size: 12px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  border-radius: 99px;
  font-weight: 600;
  vertical-align: 1px;
  white-space: nowrap;
}
.christ-anchor__nt-glyph{
  font-family: var(--serif);
  font-style: normal;
}

@media (max-width: 1100px){
  .christ-anchor__inner{ grid-template-columns: 1fr; gap: 18px; }
  .christ-anchor__q{ font-size: 32px; }
}
@media (max-width: 760px){
  .christ-anchor__inner{ padding: 18px 20px 20px; }
  .christ-anchor__q{ font-size: 26px; }
}

/* ============ Overview Intro — Session 01 as thesis ============ */
.overview-intro{
  position: relative;
  margin: 0 0 18px;
  padding: 26px 30px 22px;
  border: 1px solid var(--rule);
  border-radius: 16px;
  background:
    radial-gradient(800px 320px at 6% -10%, var(--c-kingdom-soft), transparent 60%),
    radial-gradient(700px 280px at 50% -20%, var(--c-salvation-soft), transparent 60%),
    radial-gradient(800px 320px at 96% -10%, var(--c-promises-soft), transparent 60%),
    linear-gradient(180deg, var(--bg-card) 0%, var(--bg-card-2) 100%);
  box-shadow: var(--shadow-deep);
  cursor: pointer;
  transition: box-shadow 220ms ease, transform 220ms ease;
  overflow: hidden;
  isolation: isolate;
}
.overview-intro:hover{
  box-shadow: 0 2px 0 rgba(40,30,10,0.05), 0 28px 64px -22px rgba(40,30,10,0.35);
}
.overview-intro::before{
  content:'';
  position: absolute;
  inset: 0;
  border-top: 4px solid transparent;
  border-image: linear-gradient(90deg, var(--c-kingdom), var(--c-salvation), var(--c-promises)) 1;
  border-image-slice: 1;
  pointer-events: none;
  z-index: 1;
}
.overview-intro__head{
  display:flex; justify-content:space-between; align-items:center;
  gap: 14px; flex-wrap: wrap;
  margin-bottom: 14px;
}
.overview-intro__meta{
  display:flex; align-items:baseline; gap: 14px;
  flex-wrap: wrap;
}
.overview-intro__badge{
  font-family: var(--mono);
  font-size: 12px;
  letter-spacing: 0.24em;
  text-transform: uppercase;
  color: var(--ink-2);
  font-weight: 700;
  padding: 4px 10px;
  border: 1px solid var(--ink-2);
  border-radius: 99px;
  background: var(--bg-card);
}
.overview-intro__topic{
  font-family: var(--serif);
  font-style: italic;
  font-size: 18px;
  color: var(--ink-3);
}
.overview-intro__open{
  /* navbtn base styles apply; this just nudges weight */
  font-weight: 600;
}
.overview-intro__thesis{
  position: relative;
  margin: 0 0 8px;
  padding: 10px 12px 12px 38px;
  font-family: var(--serif);
  font-style: italic;
  font-size: 40px;
  line-height: 1.05;
  font-weight: 500;
  color: var(--ink);
  letter-spacing: -0.015em;
  text-wrap: balance;
  max-width: 36ch;
}
.overview-intro__qmark{
  font-family: var(--serif);
  font-size: 72px;
  line-height: 0.5;
  color: var(--ink-3);
  opacity: 0.32;
  position: absolute;
  left: -2px; top: 36px;
  pointer-events: none;
  font-style: normal;
}
.overview-intro__qmark--end{
  position: static;
  margin-left: 4px;
  font-size: 40px;
  top: auto; left: auto;
  vertical-align: -10px;
}
.overview-intro__lede{
  font-family: var(--sans);
  font-size: 13px;
  letter-spacing: 0.02em;
  color: var(--ink-3);
  font-weight: 500;
  margin: 6px 0 14px;
}
.overview-intro__threads{
  display:grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 14px;
  margin-bottom: 16px;
}
.overview-thread{
  border: 1px solid var(--rule);
  border-radius: 12px;
  padding: 14px 16px 14px;
  background:
    linear-gradient(180deg, var(--theme-soft), var(--bg-card) 75%);
  position: relative;
  display: flex; flex-direction: column;
  gap: 10px;
  cursor: pointer;
  transition: transform 160ms ease, box-shadow 160ms ease, border-color 160ms ease;
}
.overview-thread::before{
  content:'';
  position: absolute; left:0; top:0; bottom: 0;
  width: 3px;
  background: var(--theme-color);
  border-radius: 3px 0 0 3px;
}
.overview-thread:hover{
  border-color: var(--theme-color);
  transform: translateY(-1px);
  box-shadow: var(--shadow-soft);
}
.overview-thread__head{
  display:flex; align-items:baseline; gap: 8px;
}
.overview-thread__glyph{
  font-family: var(--serif);
  font-size: 22px;
  color: var(--theme-color);
  line-height: 1;
}
.overview-thread__label{
  font-family: var(--serif);
  font-style: italic;
  font-size: 22px;
  color: var(--ink);
  font-weight: 500;
  letter-spacing: -0.005em;
}
.overview-thread__refs{
  list-style: none;
  margin: 0; padding: 0;
  display:flex; flex-direction: column;
  gap: 2px;
}
.overview-thread__ref{
  font-family: var(--mono);
  font-size: 12px;
  letter-spacing: 0.02em;
  color: var(--ink-2);
  padding: 3px 0;
  border-bottom: 1px dashed var(--rule);
}
.overview-thread__ref:last-child{ border-bottom: 0; }
.overview-thread__cta{
  font-family: var(--mono);
  font-size: 12px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--theme-color);
  font-weight: 700;
  margin-top: 2px;
}
.overview-thread__sub{
  margin-top: 4px;
  padding-top: 10px;
  border-top: 1px dashed var(--rule);
  display:flex; flex-direction: column; gap: 4px;
}
.overview-thread__sub-row{
  display:flex; align-items: baseline;
  gap: 6px;
  flex-wrap: wrap;
}
.overview-thread__sub-hook{
  color: var(--theme-color);
  font-family: var(--serif);
  font-size: 14px;
  line-height: 1;
}
.overview-thread__sub-title{
  font-family: var(--serif);
  font-style: italic;
  font-size: 14px;
  color: var(--ink);
  font-weight: 500;
}
.overview-thread__sub-figures{
  font-family: var(--mono);
  font-size: 12px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--ink-3);
  font-weight: 600;
}
.overview-thread__sub-sep{ margin: 0 4px; opacity: 0.5; }
.overview-intro__foot{
  display:flex; align-items:flex-start; gap: 12px;
  padding-top: 14px;
  border-top: 1px dashed var(--rule);
  font-family: var(--serif);
  font-style: italic;
  font-size: 15px;
  line-height: 1.4;
  color: var(--ink-2);
}
.overview-intro__arrow{
  font-family: var(--serif);
  font-size: 20px;
  color: var(--ink-3);
  line-height: 1;
  margin-top: 2px;
}

@media (max-width: 1100px){
  .overview-intro__threads{ grid-template-columns: 1fr 1fr; }
  .overview-intro__thesis{ font-size: 32px; }
}
@media (max-width: 760px){
  .overview-intro{ padding: 20px 18px 18px; }
  .overview-intro__threads{ grid-template-columns: 1fr; }
  .overview-intro__thesis{ font-size: 24px; padding-left: 30px; }
  .overview-intro__qmark{ font-size: 50px; top: 30px; }

/* ============ Covenants strip (above subway) ============ */

  margin: 4px 0 16px;
}

  margin-bottom: 10px;
  padding: 0 2px;

.covstrip__eyebrow{
  font-family: var(--mono);
  text-transform: uppercase;

.covchip__meta{

.covchip__passage{

  font-size: 12px;

.covchip__sessions{

  font-size: 12px;
  letter-spacing: 0.14em;

  text-transform: uppercase;

}
.covchip__sep{ margin: 0 4px; opacity: 0.5; }
.covchip__sub{
